/* Ids matching the current dashboard filter, for dimming the tree. */
function spotlightIds() {
  var ids = {};
  STATE.people.forEach(function (p) { if (bloomMatches(p)) ids[p.id] = true; });
  return ids;
}

function animateBloomCount() {
  var el = document.getElementById('bloomCount');
  if (!el) return;
  if (typeof requestAnimationFrame !== 'function') return;   // leave the final value in place
  var target = STATE._bloomTarget || 0, start = Date.now(), dur = 1400;
  (function tick() {
    if (!document.body.contains(el)) return;
    var p = Math.min((Date.now() - start) / dur, 1);
    el.textContent = Math.round((1 - Math.pow(1 - p, 3)) * target);
    if (p < 1) requestAnimationFrame(tick);
  })();
}

/* Builds a real graph — people AND edges — so the same kinship engine drives
   an onboarding-built tree and the demo tree. Birth years are synthesised
   relative to the ego so that older/younger and birth-rank resolve. */
function buildFamily(a) {
  var people = [], edges = [], egoId = 'ego';
  var EGO_YEAR = 1990, PARENT_YEAR = 1960, GP_YEAR = 1932;   // shifted if a real birth year is given

  var ego = { id: egoId, name: a.egoName || 'You', gender: a.egoGender, isEgo: true, birthYear: EGO_YEAR };
  // Whatever the person chose to give us — any part may be blank
  var dd = parseInt(a.egoDay, 10), yy = parseInt(a.egoYear, 10);
  if (a.egoMonth && dd >= 1 && dd <= 31) ego.birthDate = a.egoMonth + '-' + String(dd).padStart(2, '0');
  if (yy >= 1700 && yy <= new Date().getFullYear()) {
    // Shift the generated generations with the real year, or the parents would
    // end up only a few years older than their child.
    ego.birthYear = yy;
    EGO_YEAR = yy;
    PARENT_YEAR = yy - 30;
    GP_YEAR = yy - 58;
  }
  people.push(ego);
  people.push({ id: 'ba', name: 'Ba', gender: 'male',   birthYear: PARENT_YEAR, birthOrder: a.fatherOlderBrothers + 1 });
  people.push({ id: 'ma', name: 'Ma', gender: 'female', birthYear: PARENT_YEAR + 1, birthOrder: a.motherBrothers + 1 });
  people.push({ id: 'pa-gong', name: 'A-gong', gender: 'male',   birthYear: GP_YEAR });
  people.push({ id: 'pa-ma',   name: 'A-ma',   gender: 'female', birthYear: GP_YEAR + 3 });
  people.push({ id: 'ma-gong', name: 'A-gong', gender: 'male',   birthYear: GP_YEAR + 2 });
  people.push({ id: 'ma-ma',   name: 'A-ma',   gender: 'female', birthYear: GP_YEAR + 5 });

  edges.push({ type: 'spouse', a: 'ba', b: 'ma' });
  edges.push({ type: 'spouse', a: 'pa-gong', b: 'pa-ma' });
  edges.push({ type: 'spouse', a: 'ma-gong', b: 'ma-ma' });
  edges.push({ type: 'parent', a: 'ba', b: egoId });
  edges.push({ type: 'parent', a: 'ma', b: egoId });
  ['pa-gong', 'pa-ma'].forEach(function (g) { edges.push({ type: 'parent', a: g, b: 'ba' }); });
  ['ma-gong', 'ma-ma'].forEach(function (g) { edges.push({ type: 'parent', a: g, b: 'ma' }); });

  function addMany(count, prefix, label, gender, parents, yearOf, orderOf) {
    for (var i = 0; i < count; i++) {
      var id = prefix + '-' + i;
      people.push({
        id: id,
        name: label + (count > 1 ? ' ' + (i + 1) : ''),
        gender: gender,
        birthYear: yearOf(i),
        birthOrder: orderOf(i)
      });
      parents.forEach(function (p) { edges.push({ type: 'parent', a: p, b: id }); });
    }
  }

  // ── Ego's siblings: birth order runs older → ego → younger ──
  var olderCount = a.olderBrothers + a.olderSisters;
  var oi = 0, yi = 0;
  addMany(a.olderBrothers, 'sib-ob', 'Older brother', 'male', ['ba', 'ma'],
    function () { return EGO_YEAR - 6 + (oi++); }, function (i) { return i + 1; });
  addMany(a.olderSisters, 'sib-os', 'Older sister', 'female', ['ba', 'ma'],
    function () { return EGO_YEAR - 6 + a.olderBrothers + (oi++); },
    function (i) { return a.olderBrothers + i + 1; });
  people.forEach(function (p) { if (p.id === egoId) p.birthOrder = olderCount + 1; });
  addMany(a.youngerBrothers, 'sib-yb', 'Younger brother', 'male', ['ba', 'ma'],
    function () { return EGO_YEAR + 3 + (yi++); }, function (i) { return olderCount + 2 + i; });
  addMany(a.youngerSisters, 'sib-ys', 'Younger sister', 'female', ['ba', 'ma'],
    function () { return EGO_YEAR + 3 + a.youngerBrothers + (yi++); },
    function (i) { return olderCount + 2 + a.youngerBrothers + i; });

  /* A parent's siblings are laid out oldest to youngest around the parent, so
     the rank prefixes (大 / 二 / 細) land on the right people. That ordering is
     only possible because the flow asks whether each group is older or younger
     than the parent — a bare count can't say who is the eldest. */
  function addParentSiblings(parentId, parentYear, gp, tag, older, younger) {
    var olderTotal = older.reduce(function (n, g) { return n + g.count; }, 0);
    var slot = 0;

    older.forEach(function (g) {
      addMany(g.count, tag + '-' + g.key, g.label, g.gender, gp,
        function () { return parentYear - (olderTotal - slot) * 2; },
        function () { return ++slot; });
    });

    // The parent themselves sits next in the birth order
    people.forEach(function (p) { if (p.id === parentId) p.birthOrder = olderTotal + 1; });

    var ySlot = 0;
    younger.forEach(function (g) {
      addMany(g.count, tag + '-' + g.key, g.label, g.gender, gp,
        function () { return parentYear + (ySlot + 1) * 2; },
        function () { ySlot++; return olderTotal + 1 + ySlot; });
    });
  }

  // ── Father's side: 伯 are older than him, 叔 younger; 姑 rank among themselves ──
  addParentSiblings('ba', PARENT_YEAR, ['pa-gong', 'pa-ma'], 'dad',
    [{ key: 'ob',  count: a.fatherOlderBrothers,   gender: 'male',   label: 'Uncle' },
     { key: 'os',  count: a.fatherOlderSisters,    gender: 'female', label: 'Aunt'  }],
    [{ key: 'yb',  count: a.fatherYoungerBrothers, gender: 'male',   label: 'Uncle' },
     { key: 'ys',  count: a.fatherYoungerSisters,  gender: 'female', label: 'Aunt'  }]);

  // ── Mother's side: 舅 and 姨 rank within their own sibling sets ──
  addParentSiblings('ma', PARENT_YEAR + 1, ['ma-gong', 'ma-ma'], 'mom',
    [{ key: 'ob',  count: a.motherOlderBrothers,   gender: 'male',   label: 'Uncle' },
     { key: 'os',  count: a.motherOlderSisters,    gender: 'female', label: 'Aunt'  }],
    [{ key: 'yb',  count: a.motherYoungerBrothers, gender: 'male',   label: 'Uncle' },
     { key: 'ys',  count: a.motherYoungerSisters,  gender: 'female', label: 'Aunt'  }]);

  return { people: people, edges: edges, egoId: egoId };
}

/* ══════════════════════════════════════════════════════════════════════════
   THE FORMING FAMILY
   One dot per person, built from the same buildFamily() that produces the real
   tree — so the count can never drift from what you'll actually get. Dots added
   since the last render animate in, so adding a relative is visibly felt.
   ══════════════════════════════════════════════════════════════════════════ */
function dotColorFor(id) {
  if (id === 'ego') return C.paternal;
  if (id === 'ba' || id === 'pa-gong' || id === 'pa-ma' || id.indexOf('dad-') === 0) return C.paternal;
  if (id === 'ma' || id === 'ma-gong' || id === 'ma-ma' || id.indexOf('mom-') === 0) return C.maternal;
  return C.self;                                  // your own siblings
}

function formingFamilyHtml() {
  var built = buildFamily(STATE.answers);
  var people = built.people;
  var prev = STATE._dotCount === undefined ? 0 : STATE._dotCount;
  var fresh = Math.max(0, people.length - prev);

  var dots = people.map(function (p, i) {
    var isEgo = p.id === built.egoId;
    var color = dotColorFor(p.id);
    var size = isEgo ? 46 : 34;
    // Anything beyond the previous count is new — let it pop in
    var isNew = i >= prev;
    var delay = isNew ? (i - prev) * 0.05 : 0;
    var anim = isNew
      ? ';opacity:0;animation:pop .34s cubic-bezier(.34,1.56,.64,1) ' + delay.toFixed(2) + 's forwards'
      : '';
    return '<div title="' + esc(p.name) + '" style="width:' + size + 'px;height:' + size + 'px;' +
      'border-radius:50%;flex-shrink:0;border:2px solid ' + color + ';' +
      'background:' + (isEgo ? color : C.surface) + ';' +
      'display:flex;align-items:center;justify-content:center' + anim + '">' +
      (isEgo ? '<span class="han" style="color:' + C.cream + ';font-size:17px">我</span>' : '') +
      '</div>';
  }).join('');

  STATE._dotCount = people.length;

  return '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;' +
    'height:100%;padding:40px 32px;text-align:center">' +
    '<div class="eyebrow" style="margin-bottom:20px">Your family, forming now</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:440px;margin-bottom:22px">' +
    dots + '</div>' +
    '<div style="font-size:13px;color:' + C.muted + ';line-height:1.65;max-width:380px">' +
    'Each dot is a person. Every relationship has an exact Teochew term waiting to be revealed.</div>' +
    '<div style="font-size:11.5px;color:' + C.faint + ';margin-top:14px">' +
    people.length + ' so far' +
    (fresh > 0 && prev > 0 ? ' · +' + fresh + ' just added' : '') + '</div>' +
    '</div>';
}

function onboardScreen() {
  var step = STATE.step;
  var idx = STEPS.indexOf(step);
  var progress = (idx / (STEPS.length - 1)) * 100;
  var hint = TEOCHEW_HINTS[step];
  var a = STATE.answers;

  var body = '';
  if (step === 'name') {
    body = '<div style="margin-bottom:22px">' +
      '<label class="eyebrow" style="display:block;margin-bottom:8px">Your name</label>' +
      '<div class="searchbox" style="margin-bottom:20px"><input type="text" id="egoNameInput" value="' +
      esc(a.egoName) + '" placeholder="e.g. Mei" /></div>' +
      '<label class="eyebrow" style="display:block;margin-bottom:8px">' +
      'Your birth date <span style="text-transform:none;letter-spacing:0">— optional, and you can add it later</span></label>' +
      '<div style="display:flex;gap:6px;margin-bottom:20px">' +
      '<select id="obMonth" style="flex:1.4;min-width:0;padding:10px;border-radius:10px;' +
      'border:1px solid rgba(42,31,20,0.18);background:' + C.surface + ';font-family:inherit;font-size:13px">' +
      ['<option value="">Month</option>'].concat(MONTH_NAMES.map(function (m, i) {
        var v = String(i + 1).padStart(2, '0');
        return '<option value="' + v + '"' + (a.egoMonth === v ? ' selected' : '') + '>' + m + '</option>';
      })).join('') + '</select>' +
      '<input id="obDay" type="text" inputmode="numeric" placeholder="Day" value="' + esc(a.egoDay || '') +
      '" style="flex:.7;min-width:0;padding:10px;border-radius:10px;border:1px solid rgba(42,31,20,0.18);' +
      'background:' + C.surface + ';font-size:13px;text-align:center" />' +
      '<input id="obYear" type="text" inputmode="numeric" placeholder="Year" value="' + esc(a.egoYear || '') +
      '" style="flex:1;min-width:0;padding:10px;border-radius:10px;border:1px solid rgba(42,31,20,0.18);' +
      'background:' + C.surface + ';font-size:13px;text-align:center" /></div>' +
      '<label class="eyebrow" style="display:block;margin-bottom:8px">You are</label>' +
      '<div style="display:flex;gap:8px">' +
      ['female', 'male'].map(function (g) {
        var on = a.egoGender === g;
        return '<button data-act="gender" data-value="' + g + '" style="flex:1;padding:12px;border-radius:12px;' +
          'cursor:pointer;border:1px solid ' + (on ? C.paternal : 'rgba(42,31,20,.18)') + ';background:' +
          (on ? C.paternal : 'transparent') + ';color:' + (on ? C.cream : C.ink) + ';font-size:14px">' +
          (g === 'female' ? 'Daughter / sister' : 'Son / brother') + '</button>';
      }).join('') + '</div></div>';
  } else if (step === 'parents') {
    body = '<p style="font-size:14px;color:' + C.muted + ';line-height:1.7;margin-bottom:18px">' +
      'Your father and mother are added automatically, along with both sets of grandparents. ' +
      'Kinship needs both sides to tell 伯 Be from 叔 Zeg, and 舅 Gu from 姨 Yi.</p>' +
      '<div class="card" style="padding:18px;display:flex;gap:24px;justify-content:center">' +
      [['爸', 'Ba', 'Father'], ['媽', 'Ma', 'Mother'], ['亞公', 'A-gong', 'Grandfather'], ['亞嫲', 'A-ma', 'Grandmother']]
        .map(function (t) {
          return '<div style="text-align:center"><div class="han" style="font-size:30px;line-height:1">' + t[0] + '</div>' +
            '<div class="serif" style="font-size:12px;color:' + C.paternal + ';margin-top:6px">' + t[1] + '</div>' +
            '<div style="font-size:10px;color:' + C.muted + '">' + t[2] + '</div></div>';
        }).join('') + '</div>';
  } else if (step === 'done') {
    var built = buildFamily(a);
    body = '<div style="text-align:center;padding:6px 0 2px">' +
      '<div class="han" style="font-size:64px;color:' + C.paternal + ';line-height:1;margin-bottom:12px">親</div>' +
      '<p style="font-size:15px;color:' + C.muted + ';line-height:1.7;margin:0 0 4px">' +
      '<strong style="color:' + C.ink + '">' + built.people.length + ' people</strong> in your tree, ' +
      'with ' + esc(a.egoName || 'you') + ' at the center.</p>' +
      '<p style="font-size:13px;color:' + C.faint + ';line-height:1.6;margin:0">' +
      'Every term is now calculated from your position — not ' + esc(demoEgoName()) + '&rsquo;s.</p></div>' +

      // Detail capture is optional and resumable — nobody has all of this to hand
      '<div style="margin-top:20px;padding:15px 16px;border-radius:14px;background:' + C.surface +
      ';border:1px solid rgba(42,31,20,0.10)">' +
      '<div style="font-size:13.5px;color:' + C.ink + ';margin-bottom:5px">Add their details?</div>' +
      '<p style="font-size:12px;color:' + C.muted + ';line-height:1.6;margin:0 0 12px">' +
      'Real names, birth and death dates, where each person was born and where they settled. ' +
      'You can fill these in now, or open anyone&rsquo;s card later — nothing here is required.</p>' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
      '<button data-act="onboard-details" style="flex:1;min-width:150px;padding:10px;border-radius:10px;' +
      'border:none;background:' + C.paternal + ';color:' + C.cream + ';font-size:13px;cursor:pointer">' +
      'Add details now</button>' +
      '<button data-act="onboard-next" style="flex:1;min-width:150px;padding:10px;border-radius:10px;' +
      'background:transparent;border:1px solid rgba(42,31,20,0.2);font-size:13px;cursor:pointer;color:' +
      C.ink + '">I&rsquo;ll do it later</button>' +
      '</div></div>';
  } else {
    var sideNote = step === 'dads-side'
      ? 'Older or younger than your father decides 伯 Be from 叔 Zeg, and sets who is the eldest aunt.'
      : step === 'moms-side'
        ? 'Their terms carry a rank — 大 Tua for the eldest down to 細 Soi for the youngest — so where each one falls around your mother matters.'
        : '';
    body = (sideNote
      ? '<p style="font-size:13px;color:' + C.muted + ';line-height:1.65;margin:0 0 14px">' + sideNote + '</p>'
      : '') + (STEP_COUNTERS[step] || []).map(counterRow).join('');
  }

  var hintHtml = hint
    ? '<div style="margin-top:22px;padding:14px 16px;border-radius:12px;background:' + C.surface +
      ';border:1px solid rgba(42,31,20,.08);display:flex;align-items:center;gap:14px">' +
      '<span class="han" style="font-size:24px;color:' + C.paternal + ';flex-shrink:0">' + hint.char + '</span>' +
      '<span style="font-size:12px;color:' + C.muted + ';line-height:1.5">' + esc(hint.text) + '</span></div>'
    : '';

  var isLast = step === 'done';
  var nextLabel = isLast ? 'Open my family tree' : 'Continue';

  return '<div style="display:flex;width:100%;height:100%;overflow:hidden">' +

    // ── Left: the questions ──
    '<div class="scroll onboard-form" style="display:flex;align-items:center;' +
    'justify-content:center;padding:32px;overflow:auto">' +
    '<div style="width:100%;max-width:520px">' +
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:26px">' +
    '<div style="flex:1;height:4px;background:rgba(42,31,20,.10);border-radius:4px;overflow:hidden">' +
    '<div style="width:' + progress + '%;height:100%;background:' + C.paternal + ';transition:width .3s"></div></div>' +
    '<span style="font-size:11px;color:' + C.faint + ';flex-shrink:0">' + (idx + 1) + ' / ' + STEPS.length + '</span></div>' +
    '<h2 class="serif" style="font-size:28px;font-weight:600;margin:0 0 6px">' + esc(STEP_TITLES[step]) + '</h2>' +
    '<p style="font-size:13px;color:' + C.muted + ';margin:0 0 24px">' +
    'Kinship uses this to work out the exact term for each relative.</p>' +
    body + hintHtml +
    '<div style="display:flex;gap:10px;margin-top:28px">' +
    (idx > 0
      ? '<button class="btn-secondary" data-act="onboard-back" style="flex:0 0 auto;padding:12px 20px">Back</button>'
      : '<button class="btn-secondary" data-act="go" data-route="welcome" style="flex:0 0 auto;padding:12px 20px">Cancel</button>') +
    (isLast ? '' : '<button class="btn-primary" data-act="onboard-next">' +
      nextLabel + '</button>') +
    '</div>' +
    (STATE.isDemo || STATE.hasTree ? '' :
      '<p style="font-size:12px;color:' + C.faint + ';text-align:center;margin-top:18px">' +
      'Not ready? <button data-act="load-demo" style="background:none;border:none;color:' + C.paternal +
      ';cursor:pointer;font-size:12px;text-decoration:underline;padding:0">Explore ' + esc(demoEgoName()) + '&rsquo;s family instead</button></p>') +
    '</div></div>' +

    // ── Right: the family taking shape as you answer ──
    '<div class="scroll onboard-aside" style="border-left:1px solid rgba(42,31,20,0.08);' +
    'background:rgba(42,31,20,0.012);overflow:auto">' + formingFamilyHtml() + '</div>' +

    '</div>';
}

/* ══════ RENDER ════════════════════════════════════════════════════════ */

function render() {
  var app = document.getElementById('app');

  // Selecting a person re-renders the whole view; without this the tree would
  // jump back to the top-left every time you tapped someone.
  var prevBox = document.querySelector('.treebox');
  var keepScroll = prevBox ? { l: prevBox.scrollLeft, t: prevBox.scrollTop } : null;

  var h = '';

  if (STATE.route === 'welcome') {
    h = welcomeScreen();
  } else if (STATE.route === 'onboard') {
    h = onboardScreen();
  } else {
    h = navHtml() + demoBarHtml() + backupNudgeHtml() + '<div class="screen">' +
      (STATE.route === 'tree' ? treeScreen()
        : withFamilyViewNeutral(STATE.route === 'ask' ? askScreen : bloomScreen)) +
      '</div>';
  }

  app.innerHTML = h + modalHtml();

  persist();
  applyZoom();

  var box = document.querySelector('.treebox');
  if (box && keepScroll) { box.scrollLeft = keepScroll.l; box.scrollTop = keepScroll.t; }

  if (STATE.route === 'bloom') animateBloomCount();

  var askInput = document.getElementById('askInput');
  if (askInput && STATE._focusAsk) { askInput.focus(); askInput.setSelectionRange(askInput.value.length, askInput.value.length); }
  STATE._focusAsk = false;

  if (STATE._focusPicker) {
    var pk = document.getElementById('picker' + STATE._focusPicker);
    if (pk) pk.focus();
    STATE._focusPicker = null;
  }

  var nameInput = document.getElementById('egoNameInput');
  if (nameInput && STATE._focusName) { nameInput.focus(); nameInput.setSelectionRange(nameInput.value.length, nameInput.value.length); }
  STATE._focusName = false;
}

function go(route) {
  STATE.route = route;
  STATE.langOpen = false;
  STATE.pickerOpen = null;
  render();
}

/* ══════ EVENTS ════════════════════════════════════════════════════════ */

document.addEventListener('click', function (e) {
  var stop = e.target.closest('[data-stop]');
  var el = e.target.closest('[data-act]');

  // Clicking the modal body should not close it
  if (stop && el && el.getAttribute('data-act') === 'close-modal' && el.contains(stop) && el !== e.target) return;
  if (!el) {
    if (STATE.langOpen || STATE.pickerOpen) { STATE.langOpen = false; STATE.pickerOpen = null; render(); }
    return;
  }
  if (el.hasAttribute('disabled')) return;

  var act = el.getAttribute('data-act');

  switch (act) {
    case 'noop':
      break;

    case 'go':
      go(el.getAttribute('data-route'));
      break;

    case 'load-demo':
      loadDemo();
      go('tree');
      break;

    case 'start-onboard':
      resetToOnboarding();
      go('onboard');
      break;

    case 'toggle-lang':
      STATE.langOpen = !STATE.langOpen;
      STATE.dataOpen = false;
      render();
      break;

    case 'toggle-data':
      STATE.dataOpen = !STATE.dataOpen;
      STATE.langOpen = false;
      render();
      break;

    case 'download-tree':
      downloadTree();
      break;

    case 'import-tree':
      STATE.dataOpen = false;
      triggerImportPicker();
      render();
      break;

    case 'snooze-nudge':
      PREFS.snoozedAtCount = STATE.people.length;
      savePrefs();
      render();
      break;

    case 'erase-tree':
      STATE.dataOpen = false;
      STATE.modal = 'erase-tree';
      render();
      break;

    case 'confirm-erase':
      clearSaved();
      STATE.people = []; STATE.edges = []; STATE.egoId = '';
      STATE.termOverrides = {}; STATE.hasTree = false; STATE.isDemo = false;
      STATE.selectedId = null; STATE.bloomFilter = null; STATE.zoom = null;
      STATE.connectA = null; STATE.connectB = null; STATE.connectShow = false;
      STATE.askTerm = null; STATE.askQuery = ''; STATE.guidePath = []; STATE.guideStep = 'root';
      STATE.demoBarDismissed = false; STATE.modal = null; STATE.route = 'welcome';
      // The backup history belonged to the tree that just went away.
      PREFS.lastExportCount = null; PREFS.snoozedAtCount = null; savePrefs();
      invalidateLayout();
      render();
      break;

    case 'confirm-import':
      if (STATE.pendingImport) {
        applySnapshot(STATE.pendingImport);
        STATE.pendingImport = null;
        STATE.modal = null;
        STATE.route = 'tree';
        persist();
      }
      render();
      break;

    case 'lang':
      STATE.language = el.getAttribute('data-value');
      STATE.langOpen = false;
      STATE.dataOpen = false;
      render();
      break;

    case 'gpstyle':
      STATE.grandparentStyle = el.getAttribute('data-value');
      render();
      break;

    /* ── Demo exit ── */
    case 'exit-demo':
      STATE.modal = 'exit-demo';
      render();
      break;

    case 'dismiss-demobar':
      STATE.demoBarDismissed = true;
      render();
      break;

    case 'close-modal':
      STATE.pendingImport = null;
      STATE.importError = '';
      STATE.modal = null;
      render();
      break;

    case 'confirm-exit-demo':
      STATE.modal = null;
      resetToOnboarding();
      go('onboard');
      break;

    /* ── Tree ── */
    case 'pick-node':
      var id = el.getAttribute('data-id');
      STATE.selectedId = STATE.selectedId === id ? null : id;
      render();
      break;

    case 'close-panel':
      STATE.selectedId = null;
      STATE.editingBirth = null;
      STATE.confirmRemove = null;
      render();
      break;

    case 'set-partner-role':
      var pp = getPerson(el.getAttribute('data-id'));
      if (pp) {
        var role = el.getAttribute('data-value');
        pp.partnerRole = role;
        var def = PARTNER_ROLES.filter(function (r) { return r.key === role; })[0];
        if (def && def.gender) pp.gender = def.gender; else delete pp.gender;
        invalidateLayout();
      }
      render();
      break;

    case 'set-gender':
      var gp = getPerson(el.getAttribute('data-id'));
      if (gp) {
        var gv = el.getAttribute('data-value');
        if (gv) gp.gender = gv; else delete gp.gender;
        invalidateLayout();
      }
      render();
      break;

    case 'add-relative':
      addRelative(el.getAttribute('data-kind'), el.getAttribute('data-id'));
      break;

    case 'ask-remove':
      STATE.confirmRemove = el.getAttribute('data-id');
      render();
      break;

    case 'cancel-remove':
      STATE.confirmRemove = null;
      render();
      break;

    case 'confirm-remove':
      removePerson(el.getAttribute('data-id'));
      break;

    /* ── Birth dates ── */
    case 'edit-birth':
      STATE.editingBirth = el.getAttribute('data-id');
      render();
      break;

    case 'cancel-birth':
      STATE.editingBirth = null;
      render();
      break;

    case 'clear-birth':
      var cp = getPerson(el.getAttribute('data-id'));
      if (cp) { delete cp.birthDate; delete cp.birthYear; }
      STATE.editingBirth = null;
      render();
      break;

    case 'save-birth':
      saveBirthDate(el.getAttribute('data-id'));
      break;

    case 'side-filter':
      STATE.sideFilter = el.getAttribute('data-value');
      render();
      break;

    case 'toggle-marriages':
      // Hiding marriages removes married-in relatives entirely and reflows the
      // tree around the blood line, rather than just hiding the connecting lines.
      STATE.showMarriages = !STATE.showMarriages;
      STATE.selectedId = null;
      invalidateLayout();
      render();
      break;

    case 'toggle-legend':
      STATE.showLegend = !STATE.showLegend;
      render();
      break;

    /* ── Bloom dashboard filter ── */
    case 'bloom-filter':
      var fk = el.getAttribute('data-kind'), fv = el.getAttribute('data-value');
      var same = STATE.bloomFilter && STATE.bloomFilter.kind === fk && STATE.bloomFilter.value === fv;
      STATE.bloomFilter = same ? null : { kind: fk, value: fv };   // click again to clear
      render();
      break;

    case 'clear-bloom-filter':
      STATE.bloomFilter = null;
      render();
      break;

    /* ── Zoom ── */
    case 'zoom-in':
      stepZoom(1, document.querySelector('.treebox'));
      break;

    case 'zoom-out':
      stepZoom(-1, document.querySelector('.treebox'));
      break;

    case 'zoom-fit':
      STATE.zoom = null;
      applyZoom();
      break;

    /* ── Ask ── */
    case 'ask-panel':
      STATE.askPanel = el.getAttribute('data-value');
      STATE.pickerOpen = null;
      render();
      break;

    case 'search':
      var input = document.getElementById('askInput');
      STATE.askQuery = input ? input.value : STATE.askQuery;
      var key = matchQuery(STATE.askQuery);
      STATE.askTerm = key ? (TERM_TABLE[key] || null) : null;
      STATE.askLabel = STATE.askQuery;
      render();
      break;

    case 'example':
      var ex = QUICK_EXAMPLES[Number(el.getAttribute('data-idx'))];
      STATE.askTerm = TERM_TABLE[ex.roleKey] || null;
      STATE.askLabel = ex.label;
      STATE.askQuery = ex.label;
      render();
      break;

    case 'term-card':
      var t = TERM_TABLE[el.getAttribute('data-key')];
      STATE.askTerm = t;
      STATE.askLabel = t.breakdown;
      render();
      break;

    case 'guide-pick':
      var opt = GUIDE_STEPS[el.getAttribute('data-step')][Number(el.getAttribute('data-idx'))];
      STATE.guidePath = STATE.guidePath.concat([opt.crumb]);
      if (opt.role) {
        STATE.askTerm = TERM_TABLE[opt.role] || null;
        STATE.askLabel = STATE.guidePath.join(' → ');
      } else if (opt.next) {
        STATE.guideStep = opt.next;
      }
      render();
      break;

    case 'guide-reset':
      STATE.guidePath = [];
      STATE.guideStep = 'root';
      render();
      break;

    case 'toggle-picker':
      var slot = el.getAttribute('data-slot');
      STATE.pickerOpen = STATE.pickerOpen === slot ? null : slot;
      STATE._focusPicker = STATE.pickerOpen;
      render();
      break;

    case 'pick-person':
      var s = el.getAttribute('data-slot');
      if (s === 'A') STATE.connectA = el.getAttribute('data-id');
      else STATE.connectB = el.getAttribute('data-id');
      STATE.pickerOpen = null;
      STATE.pickerQuery[s] = '';
      STATE.connectShow = false;
      render();
      break;

    /* ── Picking straight off the tree ── */
    case 'pick-from-tree':
      var tid = el.getAttribute('data-id');
      if (STATE.connectA === tid) STATE.connectA = null;
      else if (STATE.connectB === tid) STATE.connectB = null;
      else if (!STATE.connectA) STATE.connectA = tid;
      else if (!STATE.connectB) STATE.connectB = tid;
      else { STATE.connectA = tid; STATE.connectB = null; }   // start a fresh pair
      STATE.connectShow = false;
      render();
      break;

    case 'clear-slot':
      if (el.getAttribute('data-slot') === 'A') STATE.connectA = null; else STATE.connectB = null;
      STATE.connectShow = false;
      render();
      break;

    case 'reset-connection':
      STATE.connectA = null; STATE.connectB = null;
      STATE.connectShow = false;
      STATE.pickerOpen = null;
      STATE.pickerQuery = { A: '', B: '' };
      STATE.submitOpen = null;
      render();
      break;

    /* ── Contributing a term the rules don't know ── */
    case 'open-submit':
      STATE.submitOpen = el.getAttribute('data-key');
      render();
      break;

    case 'cancel-submit':
      STATE.submitOpen = null;
      render();
      break;

    case 'save-submission':
      saveSubmission(el.getAttribute('data-key'));
      break;

    case 'undo-submission':
      var uk = el.getAttribute('data-key').split('>');
      STATE.submissions = STATE.submissions.filter(function (x) {
        return !(x.fromId === uk[0] && x.toId === uk[1]);
      });
      render();
      break;

    case 'copy-submissions':
      copySubmissions();
      break;

    case 'swap-people':
      var tmp = STATE.connectA;
      STATE.connectA = STATE.connectB;
      STATE.connectB = tmp;
      STATE.connectShow = false;
      render();
      break;

    case 'show-connection':
      STATE.connectShow = true;
      render();
      break;

    /* ── Onboarding ── */
    case 'gender':
      captureOnboardInputs();
      STATE.answers.egoGender = el.getAttribute('data-value');
      STATE._focusName = false;
      render();
      break;

    case 'count':
      STATE.answers[el.getAttribute('data-key')] =
        Math.max(0, STATE.answers[el.getAttribute('data-key')] + Number(el.getAttribute('data-delta')));
      render();
      break;

    case 'onboard-back':
      captureOnboardInputs();
      STATE.step = STEPS[Math.max(0, STEPS.indexOf(STATE.step) - 1)];
      render();
      break;

    case 'onboard-details':
      finishOnboarding(true);
      break;

    case 'onboard-next':
      captureOnboardInputs();
      if (STATE.step === 'done') {
        finishOnboarding(false);
      } else {
        STATE.step = STEPS[Math.min(STEPS.length - 1, STEPS.indexOf(STATE.step) + 1)];
        render();
      }
      break;
  }
});

/* Validates and stores the whole detail set. Rejects impossible dates rather
   than silently coercing them — a wrong date is worse than a missing one. */
function saveBirthDate(id) {
  var person = getPerson(id);
  if (!person) return;
  var errEl = document.getElementById('birthError');
  var failed = null;
  function fail(msg) { failed = msg; return null; }

  /* Reads one date group, returning { date, year } or null if it's unusable */
  function readDate(prefix, what) {
    var monthEl = document.getElementById(prefix + 'Month');
    var dayEl = document.getElementById(prefix + 'Day');
    var yearEl = document.getElementById(prefix + 'Year');
    var month = monthEl ? monthEl.value : '';
    var day = dayEl ? dayEl.value.trim() : '';
    var year = yearEl ? yearEl.value.trim() : '';
    var d = day ? parseInt(day, 10) : null;
    var y = year ? parseInt(year, 10) : null;

    if (day && (isNaN(d) || d < 1 || d > 31)) return fail(what + ' day must be between 1 and 31.');
    if (year && (isNaN(y) || y < 1700 || y > new Date().getFullYear())) {
      return fail(what + ' year must be between 1700 and ' + new Date().getFullYear() + '.');
    }
    if (d && !month) return fail('Pick a month to go with the ' + what.toLowerCase() + ' day.');
    if (month && d) {
      var maxDay = [31, 29, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31][parseInt(month, 10) - 1];
      if (d > maxDay) return fail(MONTH_NAMES[parseInt(month, 10) - 1] + ' has only ' + maxDay + ' days.');
    }
    return { date: (month && d) ? month + '-' + String(d).padStart(2, '0') : null, year: y || null };
  }

  var birth = readDate('birth', 'Birth');
  var death = readDate('death', 'Death');
  if (failed) { if (errEl) { errEl.textContent = failed; errEl.style.display = 'block'; } return; }

  if (birth.year && death.year && death.year < birth.year) {
    if (errEl) { errEl.textContent = 'Died before born — check the years.'; errEl.style.display = 'block'; }
    return;
  }

  var nameEl = document.getElementById('detailName');
  if (nameEl && nameEl.value.trim()) {
    person.name = nameEl.value.trim();
    delete person.nickname;                 // the typed name is what should show
  }

  if (birth.date) person.birthDate = birth.date; else delete person.birthDate;
  if (birth.year) person.birthYear = birth.year; else delete person.birthYear;
  if (death.date) person.deathDate = death.date; else delete person.deathDate;
  if (death.year) person.deathYear = death.year; else delete person.deathYear;

  var bornSel = document.getElementById('bornInSel');
  var setSel = document.getElementById('settledInSel');
  if (bornSel) { if (bornSel.value) person.bornIn = bornSel.value; else delete person.bornIn; }
  if (setSel) { if (setSel.value) person.settledIn = setSel.value; else delete person.settledIn; }

  STATE.editingBirth = null;
  invalidateLayout();      // plate widths change when the name does
  render();
}

/* Builds the tree and opens it. `withDetails` starts on your own card with the
   editor open, so "add details now" lands somewhere useful rather than just
   dropping you into the tree. */
function finishOnboarding(withDetails) {
  captureOnboardInputs();
  var built = buildFamily(STATE.answers);
  STATE.people = built.people;
  STATE.edges = normalizeEdges(built.edges);
  STATE.egoId = built.egoId;
  STATE.isDemo = false;
  STATE.hasTree = true;
  STATE.selectedId = withDetails ? built.egoId : null;
  STATE.editingBirth = withDetails ? built.egoId : null;
  STATE.zoom = null;
  invalidateLayout();
  go('tree');
}

/* Stores a contributed term. Requires the characters at minimum — a romanization
   with no characters isn't much use to whoever reviews these later. */
function saveSubmission(key) {
  var parts = key.split('>');
  var from = getPerson(parts[0]), to = getPerson(parts[1]);
  if (!from || !to) return;
  var charsEl = document.getElementById('subChars');
  var romEl = document.getElementById('subRom');
  var noteEl = document.getElementById('subNote');
  var errEl = document.getElementById('subError');
  var chars = charsEl ? charsEl.value.trim() : '';
  var rom = romEl ? romEl.value.trim() : '';

  if (!chars) {
    if (errEl) { errEl.textContent = 'Add the characters — that is the part worth recording.'; errEl.style.display = 'block'; }
    return;
  }

  STATE.submissions.push({
    fromId: from.id, toId: to.id,
    fromName: displayName(from), toName: displayName(to),
    relationship: describeRelationship(to.id),
    characters: chars, romanization: rom,
    note: noteEl ? noteEl.value.trim() : '',
    at: new Date().toISOString().slice(0, 10)
  });
  STATE.submitOpen = null;
  render();
}

function submissionsAsText() {
  return STATE.submissions.map(function (s) {
    return s.fromName + ' → ' + s.toName + '  |  ' + s.characters +
      (s.romanization ? ' ' + s.romanization : '') +
      (s.note ? '  |  ' + s.note : '') + '  |  ' + s.at;
  }).join('\n');
}

function copySubmissions() {
  var text = submissionsAsText();
  var note = document.getElementById('copyNote');
  function done(ok) { if (note) note.textContent = ok ? 'Copied' : 'Copy failed — select the text manually'; }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function () { done(true); }, function () { done(false); });
  } else {
    done(false);
  }
}

function captureOnboardInputs() {
  var nameInput = document.getElementById('egoNameInput');
  if (nameInput) STATE.answers.egoName = nameInput.value;
  var m = document.getElementById('obMonth');
  var d = document.getElementById('obDay');
  var y = document.getElementById('obYear');
  if (m) STATE.answers.egoMonth = m.value;
  if (d) STATE.answers.egoDay = d.value.trim();
  if (y) STATE.answers.egoYear = y.value.trim();
}

document.addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && e.target.id === 'askInput') {
    STATE.askQuery = e.target.value;
    var key = matchQuery(STATE.askQuery);
    STATE.askTerm = key ? (TERM_TABLE[key] || null) : null;
    STATE.askLabel = STATE.askQuery;
    STATE._focusAsk = true;
    render();
  }
  if (e.key === 'Enter' && e.target.id === 'egoNameInput') {
    captureOnboardInputs();
    STATE.step = STEPS[Math.min(STEPS.length - 1, STEPS.indexOf(STATE.step) + 1)];
    render();
  }
  if (e.key === 'Escape') {
    if (STATE.modal) { STATE.modal = null; render(); }
    else if (STATE.langOpen || STATE.dataOpen || STATE.pickerOpen) { STATE.langOpen = false; STATE.dataOpen = false; STATE.pickerOpen = null; render(); }
    else if (STATE.selectedId) { STATE.selectedId = null; render(); }
  }
});

/* Keyboard zoom, and ctrl/⌘ + wheel over a tree — the conventions people expect */
document.addEventListener('keydown', function (e) {
  if (e.target.tagName === 'INPUT') return;
  if (!document.querySelector('[data-tree-svg]')) return;
  if (e.key === '+' || e.key === '=') stepZoom(1);
  else if (e.key === '-' || e.key === '_') stepZoom(-1);
  else if (e.key === '0') { STATE.zoom = null; applyZoom(); }
});

/* Wheel or trackpad pinch over a tree zooms continuously, anchored at the
   pointer. Trackpad pinch arrives as a wheel event with ctrlKey set. */
document.addEventListener('wheel', function (e) {
  var box = e.target.closest ? e.target.closest('.treebox') : null;
  if (!box) return;
  if (e.shiftKey) return;               // shift+wheel keeps its usual pan behavior
  e.preventDefault();
  var rect = box.getBoundingClientRect();
  // Pinch gestures report far larger deltas than a mouse notch
  var intensity = (e.ctrlKey || e.metaKey) ? 0.012 : 0.0022;
  var factor = Math.exp(-e.deltaY * intensity);
  setZoom(currentScale() * factor, box, e.clientX - rect.left, e.clientY - rect.top);
}, { passive: false });

/* Drag to pan, so a zoomed-in tree can be moved around directly */
(function () {
  var dragging = null;
  document.addEventListener('mousedown', function (e) {
    if (e.button !== 0) return;
    var box = e.target.closest ? e.target.closest('.treebox') : null;
    if (!box) return;
    if (e.target.closest('.node')) return;        // let node clicks through
    dragging = { box: box, x: e.clientX, y: e.clientY,
                 sl: box.scrollLeft, st: box.scrollTop, moved: false };
    box.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    var dx = e.clientX - dragging.x, dy = e.clientY - dragging.y;
    if (Math.abs(dx) + Math.abs(dy) > 3) dragging.moved = true;
    dragging.box.scrollLeft = dragging.sl - dx;
    dragging.box.scrollTop = dragging.st - dy;
  });
  document.addEventListener('mouseup', function () {
    if (!dragging) return;
    dragging.box.style.cursor = '';
    dragging = null;
  });
})();

window.addEventListener('resize', function () { if (STATE.zoom === null) applyZoom(); });

document.addEventListener('input', function (e) {
  if (e.target.id === 'pickerA' || e.target.id === 'pickerB') {
    var slot = e.target.getAttribute('data-slot');
    STATE.pickerQuery[slot] = e.target.value;
    STATE.pickerOpen = slot;
    STATE._focusPicker = slot;
    var caret = e.target.selectionStart;
    render();
    var again = document.getElementById('picker' + slot);
    if (again) { again.focus(); try { again.setSelectionRange(caret, caret); } catch (err) {} }
    return;
  }
  if (e.target.id === 'askInput') STATE.askQuery = e.target.value;
  if (e.target.id === 'egoNameInput') STATE.answers.egoName = e.target.value;
});

/* Boot. A returning visitor should land back in their tree, not on the welcome
   screen being asked to build one they already have. */
var favicon = document.getElementById('favicon');
if (favicon) favicon.href = LOGO_SRC;

loadPrefs();
initDropTarget();
if (restore()) {
  STATE.route = STATE.people.length ? 'tree' : 'welcome';
}
render();
</script>
</body>
</html>
