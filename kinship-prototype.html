<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kinship 親情 — prototype</title>
<link rel="icon" type="image/png" id="favicon" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: #F4EDE0;
    color: #2A1F14;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
  }
  #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .han { font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif; }
  .serif { font-family: 'Lora', serif; }

  button { font-family: inherit; }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #BF5A35; outline-offset: 2px;
  }

  /* ── Shell ─────────────────────────────────────────────── */
  .nav {
    height: 58px; background: #EDE4D2; flex-shrink: 0;
    border-bottom: 1px solid rgba(42,31,20,0.10);
    display: flex; align-items: center; padding: 0 24px; gap: 26px;
  }
  .logo { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
  .logo img { display: block; flex-shrink: 0; }
  .logo b { font-family: 'Lora', serif; font-size: 21px; font-weight: 600; }
  .logo span { font-size: 15px; color: #A89880; letter-spacing: 0.1em; }

  .tabs { display: flex; gap: 2px; flex: 1; }
  .tab {
    display: flex; align-items: center; gap: 7px; padding: 6px 14px;
    border-radius: 9px; border: none; background: transparent; color: #8A7A68;
    cursor: pointer; font-size: 13px; transition: background .15s, color .15s;
  }
  .tab:hover { background: rgba(42,31,20,0.06); }
  .tab.active { background: #BF5A35; color: #FDF8F0; }
  .tab.active:hover { background: #A94D2C; }
  .tab .han { font-size: 15px; }

  .navbtn {
    padding: 6px 12px; border-radius: 9px; border: 1px solid rgba(42,31,20,0.18);
    background: transparent; cursor: pointer; font-size: 13px; color: #2A1F14;
    display: flex; align-items: center; gap: 8px;
  }
  .navbtn:hover { background: rgba(42,31,20,0.05); }

  .menu {
    position: absolute; top: calc(100% + 6px); right: 0; min-width: 232px; z-index: 100;
    background: #F4EDE0; border-radius: 12px; border: 1px solid rgba(42,31,20,0.12);
    box-shadow: 0 8px 24px rgba(42,31,20,0.14); overflow: hidden;
  }
  .menu button {
    width: 100%; padding: 10px 14px; background: none; border: none; text-align: left;
    border-bottom: 1px solid rgba(42,31,20,0.06); cursor: pointer;
    display: flex; align-items: center; gap: 10px;
  }
  .menu button:hover:not(:disabled) { background: #EDE4D2; }
  .menu button:disabled { opacity: .45; cursor: default; }

  .nudge {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 20px; background: #F6EFE2;
    border-bottom: 1px solid rgba(42,31,20,0.10);
  }
  .dropzone {
    position: fixed; inset: 0; z-index: 400; display: flex;
    align-items: center; justify-content: center; pointer-events: none;
    background: rgba(244,237,224,0.94); backdrop-filter: blur(2px);
  }
  .dropzone > div {
    border: 2px dashed rgba(191,90,53,0.55); border-radius: 20px;
    padding: 44px 60px; text-align: center;
  }

  .egochip { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%; background: #BF5A35;
    border: 2px solid #BF5A35; color: #FDF8F0; font-size: 12px;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }

  /* ── Demo banner ───────────────────────────────────────── */
  .demobar {
    flex-shrink: 0; display: flex; align-items: center; gap: 14px;
    padding: 9px 24px; background: rgba(200,164,90,0.16);
    border-bottom: 1px solid rgba(200,164,90,0.35); font-size: 12.5px; color: #6B5B45;
  }
  .demobar .dot {
    width: 7px; height: 7px; border-radius: 50%; background: #C8A45A; flex-shrink: 0;
  }
  .demobar .spacer { flex: 1; }
  .btn-amber {
    padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(191,90,53,0.45);
    background: #BF5A35; color: #FDF8F0; font-size: 12px; cursor: pointer; font-weight: 500;
  }
  .btn-amber:hover { background: #A94D2C; }
  .btn-ghost {
    padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(42,31,20,0.18);
    background: transparent; color: #6B5B45; font-size: 12px; cursor: pointer;
  }
  .btn-ghost:hover { background: rgba(42,31,20,0.06); }

  /* ── Modal ─────────────────────────────────────────────── */
  .backdrop {
    position: fixed; inset: 0; background: rgba(42,31,20,0.45); z-index: 500;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .modal {
    background: #F4EDE0; border-radius: 18px; padding: 30px; max-width: 460px; width: 100%;
    box-shadow: 0 24px 60px rgba(42,31,20,0.3); border: 1px solid rgba(42,31,20,0.1);
  }
  .modal h3 { font-family: 'Lora', serif; font-size: 21px; margin: 0 0 10px; font-weight: 600; }
  .modal p { font-size: 14px; color: #8A7A68; line-height: 1.65; margin: 0 0 8px; }
  .modal .row { display: flex; gap: 10px; margin-top: 22px; }
  .btn-primary {
    flex: 1; padding: 12px; border-radius: 12px; border: none; background: #BF5A35;
    color: #FDF8F0; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .btn-primary:hover { background: #A94D2C; }
  .btn-secondary {
    flex: 1; padding: 12px; border-radius: 12px; background: transparent;
    border: 1px solid rgba(42,31,20,0.2); color: #2A1F14; font-size: 14px; cursor: pointer;
  }
  .btn-secondary:hover { background: rgba(42,31,20,0.05); }

  /* ── Generic ───────────────────────────────────────────── */
  .screen { flex: 1; overflow: hidden; display: flex; }
  .panel { padding: 26px 28px; overflow-y: auto; }
  .eyebrow {
    font-size: 11px; color: #A89880; letter-spacing: 0.10em;
    text-transform: uppercase; margin-bottom: 14px;
  }
  h2.title { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  .sub { font-size: 12px; color: #8A7A68; margin: 0 0 18px; }
  .card { background: #EDE4D2; border: 1px solid rgba(42,31,20,0.08); border-radius: 16px; }
  .pill {
    padding: 5px 14px; border-radius: 20px; border: none; background: transparent;
    color: #8A7A68; font-size: 12px; cursor: pointer; transition: all .15s;
  }
  .pill:hover { color: #2A1F14; }
  .pill.active { color: #FDF8F0; font-weight: 500; }
  .pill.active.all { background: #2A1F14; }
  .pill.active.paternal { background: #BF5A35; }
  .pill.active.maternal { background: #4A7B6B; }
  .pillgroup { display: flex; padding: 3px; background: #EDE4D2; border-radius: 24px; gap: 2px; }

  .listbtn {
    width: 100%; padding: 10px 14px; border-radius: 10px; text-align: left;
    background: #EDE4D2; border: 1px solid rgba(42,31,20,0.10); cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; color: #2A1F14; margin-bottom: 6px;
  }
  .listbtn:hover { background: #E6DDD0; }

  .chip {
    padding: 5px 12px; border-radius: 20px; background: #EDE4D2;
    border: 1px solid rgba(42,31,20,0.12); font-size: 12px; color: #2A1F14; cursor: pointer;
  }
  .chip:hover { background: #E6DDD0; }

  /* ── Zoom ─────────────────────────────────────────────── */
  .treebox {
    position: relative; overflow: auto; background: transparent;
    cursor: grab; overscroll-behavior: contain;
    display: flex; align-items: center; justify-content: center;
  }
  .treebox > [data-tree-svg] { flex: 0 0 auto; margin: auto; }
  .treebox:active { cursor: grabbing; }
  /* No size transition: the scroll correction that keeps the cursor anchored
     runs immediately, so an animating width would leave it chasing stale
     dimensions. Smoothness comes from the continuous zoom factor instead. */
  .treebox [data-tree-svg] { display: block; }
  .treebox.fitted { overflow: hidden; }
  .zoombar {
    display: flex; align-items: center; gap: 2px; flex-shrink: 0;
    background: #EDE4D2; border: 1px solid rgba(42,31,20,0.14);
    border-radius: 20px; padding: 3px;
  }
  .zoombar button {
    min-width: 26px; height: 24px; border: none; background: transparent;
    color: #6B5B45; font-size: 15px; line-height: 1; cursor: pointer;
    border-radius: 16px; padding: 0 7px;
  }
  .zoombar button:hover { background: rgba(42,31,20,0.08); color: #2A1F14; }
  .zoombar button.fit { font-size: 11px; letter-spacing: .04em; }
  .zoombar #zoomLabel {
    min-width: 40px; text-align: center; font-size: 11px; color: #8A7A68;
    font-variant-numeric: tabular-nums;
  }

  /* Onboarding: questions on the left, the family forming on the right.
     Below 980px the aside is dropped rather than squeezing the form. */
  .onboard-form  { flex: 1 1 460px; min-width: 0; }
  .onboard-aside { flex: 1 1 380px; min-width: 0; }
  @media (max-width: 980px) { .onboard-aside { display: none; } }

  .node { cursor: pointer; }
  .node:hover circle.body { filter: brightness(0.97); }

  input[type=text] {
    flex: 1; background: none; border: none; outline: none;
    font-size: 14px; color: #2A1F14; font-family: inherit;
  }
  .searchbox {
    flex: 1; display: flex; align-items: center; gap: 8px; background: #EDE4D2;
    border-radius: 10px; padding: 10px 14px; border: 1px solid rgba(42,31,20,0.15);
  }

  .termgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .termcard {
    padding: 16px 12px; border-radius: 14px; background: #EDE4D2;
    border: 1px solid rgba(42,31,20,0.08); cursor: pointer; text-align: center;
    transition: transform .12s;
  }
  .termcard:hover { transform: translateY(-2px); }

  .counter-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid rgba(42,31,20,0.08);
  }
  .stepper { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center; }
  .stepper.minus { border: 1px solid rgba(42,31,20,0.2); background: none; color: #2A1F14; }
  .stepper.plus { border: none; background: #BF5A35; color: #fff; }

  /* Reveal animations start at opacity 0, so anyone who has motion turned off —
     or whose animations never run — must still be left with a visible tree. */
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    #app svg g, #app svg path, #app [style*="animation"] { opacity: 1 !important; }
  }

  @keyframes drawline { to { stroke-dashoffset: 0 } }
  @keyframes pop { from { transform: scale(0); opacity: 0 } to { transform: scale(1); opacity: 1 } }
  /* Literal values only. A var() here resolves unreliably inside @keyframes —
     the `to` frame gets dropped and the element stays invisible. Connector
     opacity is carried by the path's own attribute, inside an animated group. */
  @keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slidein { from { opacity: 0; transform: translateX(16px) } to { opacity: 1; transform: none } }

  .scroll { overflow-y: auto; }
  .scroll::-webkit-scrollbar { width: 8px; }
  .scroll::-webkit-scrollbar-thumb { background: rgba(42,31,20,0.15); border-radius: 4px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ══════════════════════════════════════════════════════════════════════════
   KINSHIP 親情 — standalone prototype
   Merged from the Figma Make export ("Create clickable prototype structure").
   Single file, no build step, no runtime dependencies. Open directly in a browser.
   ══════════════════════════════════════════════════════════════════════════ */

/* ── Palette ─────────────────────────────────────────────────────────────── */
var C = {
  bg:       '#F4EDE0',
  surface:  '#EDE4D2',
  ink:      '#2A1F14',
  muted:    '#8A7A68',
  faint:    '#A89880',
  paternal: '#BF5A35',
  maternal: '#4A7B6B',
  self:     '#C8A45A',
  marriage: '#A89880',
  cream:    '#FDF8F0'
};

/* ── Birth-rank sequences ────────────────────────────────────────────────── */
var YI_SEQUENCE = [
  { characters: '大姨', romanization: 'Tua-Yi', label: 'Big — eldest' },
  { characters: '細姨', romanization: 'Soi-Yi', label: 'Small — youngest' }
];
var GU_SEQUENCE = [
  { characters: '大舅', romanization: 'Tua-Gu', label: 'Big — eldest' },
  { characters: '二舅', romanization: 'Zi-Gu',  label: '2nd' },
  { characters: '三舅', romanization: 'Sa-Gu',  label: '3rd' },
  { characters: '細舅', romanization: 'Soi-Gu', label: 'Small — youngest' }
];
function rankSeq(seq, idx) {
  return seq.map(function (s, i) {
    return { characters: s.characters, romanization: s.romanization, label: s.label, isCurrent: i === idx };
  });
}

/* ── Canonical Teochew term table ────────────────────────────────────────── */
var TERM_TABLE = {
  father: { characters: '爸', romanization: 'Ba', pronunciation: 'Bah', breakdown: 'Your father', guaranteed: true },
  mother: { characters: '媽', romanization: 'Ma', pronunciation: 'Mah', breakdown: 'Your mother', guaranteed: true },

  // Grandparents: three naming conventions families actually use. Which one is
  // shown follows STATE.grandparentStyle — see GRANDPARENT_STYLES below.
  'paternal-grandfather': { characters: '亞公', romanization: 'A-gong', pronunciation: 'Ah-gong', breakdown: "Father's father", side: 'paternal', guaranteed: true },
  'paternal-grandmother': { characters: '亞嫲', romanization: 'A-ma', pronunciation: 'Ah-mah', breakdown: "Father's mother", side: 'paternal', guaranteed: true },
  'maternal-grandfather': { characters: '亞公', romanization: 'A-gong', pronunciation: 'Ah-gong', breakdown: "Mother's father", side: 'maternal', guaranteed: true },
  'maternal-grandmother': { characters: '亞嫲', romanization: 'A-ma', pronunciation: 'Ah-mah', breakdown: "Mother's mother", side: 'maternal', guaranteed: true },

  'inner-grandfather': { characters: '內公', romanization: 'Lai-gong', pronunciation: 'Lai-gong', breakdown: "Father's father", side: 'paternal', guaranteed: true, note: '內 Lai (inner) marks the father\u2019s side.' },
  'inner-grandmother': { characters: '內媽', romanization: 'Lai-ma', pronunciation: 'Lai-mah', breakdown: "Father's mother", side: 'paternal', guaranteed: true, note: '內 Lai (inner) marks the father\u2019s side.' },
  'outer-grandfather': { characters: '外公', romanization: 'Gua-gong', pronunciation: 'Gwa-gong', breakdown: "Mother's father", side: 'maternal', guaranteed: true, note: '外 Gua (outer) marks the mother\u2019s side.' },
  'outer-grandmother': { characters: '外媽', romanization: 'Gua-ma', pronunciation: 'Gwa-mah', breakdown: "Mother's mother", side: 'maternal', guaranteed: true, note: '外 Gua (outer) marks the mother\u2019s side.' },

  'plain-grandfather': { characters: '公', romanization: 'Gong', pronunciation: 'Gong', breakdown: 'Your grandfather', guaranteed: true, note: 'The base term, used when there is no need to say which side.' },
  'plain-grandmother': { characters: '媽', romanization: 'Ma', pronunciation: 'Mah', breakdown: 'Your grandmother', guaranteed: true, note: 'The base term, used when there is no need to say which side.' },

  'paternal-uncle-older':        { characters: '伯', romanization: 'Be',     pronunciation: 'Beh',  breakdown: "Father's older brother", side: 'paternal', guaranteed: true, note: 'Prefix A- in casual address: A-be' },
  'paternal-uncle-older-wife':   { characters: '姆', romanization: 'M',      pronunciation: 'Em',   breakdown: "Wife of father's older brother", side: 'paternal', guaranteed: true },
  'paternal-uncle-younger':      { characters: '叔', romanization: 'Zeg',    pronunciation: 'Tsek', breakdown: "Father's younger brother", side: 'paternal', guaranteed: true, note: 'Prefix A- in casual address: A-zeg' },
  'paternal-uncle-younger-wife': { characters: '嬸', romanization: 'Sim',    pronunciation: 'Sim',  breakdown: "Wife of father's younger brother", side: 'paternal', guaranteed: true },
  'paternal-aunt':               { characters: '姑', romanization: 'Gou',    pronunciation: 'Goh',  breakdown: "Father's sister", side: 'paternal', guaranteed: true, note: 'Prefix A- in casual address: A-gou' },
  'paternal-aunt-husband':       { characters: '丈', romanization: 'Die[n]', pronunciation: 'Deen', breakdown: "Husband of father's sister", side: 'paternal', guaranteed: true },

  'maternal-uncle': { characters: '舅', romanization: 'Gu', pronunciation: 'Goo', breakdown: "Mother's brother", side: 'maternal', guaranteed: true, note: 'Base term. With a known sibling set, a rank prefix applies: 大 Tua / number / 細 Soi.' },
  'maternal-uncle-big':   { characters: '大舅', romanization: 'Tua-Gu', pronunciation: 'Twa-Goo', breakdown: "Mother's eldest brother — Big Uncle", side: 'maternal', guaranteed: true, rankLabel: '1st of 4 maternal uncles', rankSequence: rankSeq(GU_SEQUENCE, 0), note: 'Tua 大 (big/eldest) + Gu 舅. Applied to the oldest uncle when the sibling set is known.' },
  'maternal-uncle-2':     { characters: '二舅', romanization: 'Zi-Gu',  pronunciation: 'Tsee-Goo', breakdown: "Mother's 2nd brother — Second Uncle", side: 'maternal', guaranteed: true, rankLabel: '2nd of 4 maternal uncles', rankSequence: rankSeq(GU_SEQUENCE, 1), note: "Zi 二 (second) + Gu 舅. From your cousins' perspective, your mother is 二姨 Zi-Yi (Second Aunt)." },
  'maternal-uncle-3':     { characters: '三舅', romanization: 'Sa-Gu',  pronunciation: 'Sah-Goo', breakdown: "Mother's 3rd brother — Third Uncle", side: 'maternal', guaranteed: true, rankLabel: '3rd of 4 maternal uncles', rankSequence: rankSeq(GU_SEQUENCE, 2), note: 'Sa 三 (third) + Gu 舅.' },
  'maternal-uncle-small': { characters: '細舅', romanization: 'Soi-Gu', pronunciation: 'Soy-Goo', breakdown: "Mother's youngest brother — Small Uncle", side: 'maternal', guaranteed: true, rankLabel: '4th of 4 maternal uncles (youngest)', rankSequence: rankSeq(GU_SEQUENCE, 3), note: 'Soi 細 (small/youngest) + Gu 舅. The youngest always gets Soi, regardless of the number.' },
  'maternal-uncle-wife':  { characters: '妗', romanization: 'Gim', pronunciation: 'Gim', breakdown: "Wife of mother's brother", side: 'maternal', guaranteed: true },

  'maternal-aunt':       { characters: '姨', romanization: 'Yi', pronunciation: 'Yee', breakdown: "Mother's sister", side: 'maternal', guaranteed: true, note: 'Base term. With a known sibling set, a rank prefix applies: 大 Tua / number / 細 Soi.' },
  'maternal-aunt-big':   { characters: '大姨', romanization: 'Tua-Yi', pronunciation: 'Twa-Yee', breakdown: "Mother's eldest sister — Big Aunt", side: 'maternal', guaranteed: true, rankLabel: '1st of 2 maternal aunts (not counting your mother)', rankSequence: rankSeq(YI_SEQUENCE, 0), note: 'Tua 大 (big/eldest) + Yi 姨. Your mother is the middle Yi (2nd); cousins call her 二姨 Zi-Yi.' },
  'maternal-aunt-small': { characters: '細姨', romanization: 'Soi-Yi', pronunciation: 'Soy-Yee', breakdown: "Mother's youngest sister — Small Aunt", side: 'maternal', guaranteed: true, rankLabel: '2nd of 2 maternal aunts (youngest)', rankSequence: rankSeq(YI_SEQUENCE, 1), note: 'Soi 細 (small/youngest) + Yi 姨. With only 2 aunts, the 2nd is automatically the smallest.' },
  'maternal-aunt-husband': { characters: '丈', romanization: 'Die[n]', pronunciation: 'Deen', breakdown: "Husband of mother's sister", side: 'maternal', guaranteed: true },

  // ── Third and fourth ascending generations ──────────────────────────────
  // 老 Lau- is the same prefix already used for 老姨/老丈 — it steps one
  // generation above the grandparents. 祖 Zou marks the ancestral generation.
  'great-grandfather': { characters: '老公', romanization: 'Lau-gong', pronunciation: 'Lao-gong', breakdown: "Your grandparent's father", guaranteed: true, note: 'Lau- 老 steps one generation above 亞公 A-gong.' },
  'great-grandmother': { characters: '老嫲', romanization: 'Lau-ma',   pronunciation: 'Lao-mah',  breakdown: "Your grandparent's mother", guaranteed: true, note: 'Lau- 老 steps one generation above 亞嫲 A-ma.' },
  'great-great-grandfather': { characters: '祖公', romanization: 'Zou-gong', pronunciation: 'Tsou-gong', breakdown: "Your great-grandparent's father", guaranteed: true, note: '祖 Zou marks the ancestral generation, two steps above 亞公 A-gong.' },
  'great-great-grandmother': { characters: '祖媽', romanization: 'Zou-ma',   pronunciation: 'Tsou-mah',  breakdown: "Your great-grandparent's mother", guaranteed: true, note: '祖 Zou marks the ancestral generation, two steps above 亞嫲 A-ma.' },

  'maternal-great-aunt':         { characters: '老姨', romanization: 'Lau-yi',     pronunciation: 'Lao-yee',  breakdown: "Mother's mother's sister", side: 'maternal', guaranteed: true, note: 'Lau- 老 (grand) applied to Yi 姨, stepping one generation up.' },
  'maternal-great-aunt-husband': { characters: '老丈', romanization: 'Lau-die[n]', pronunciation: 'Lao-deen', breakdown: "Husband of mother's mother's sister", side: 'maternal', guaranteed: true },

  'older-brother':   { characters: '兄', romanization: 'Hia[n]', pronunciation: 'Hian', breakdown: 'Your older brother',   side: 'self', guaranteed: true },
  'younger-brother': { characters: '弟', romanization: 'Di',     pronunciation: 'Dee',  breakdown: 'Your younger brother', side: 'self', guaranteed: true, addressByName: true, note: 'Junior relatives may also be addressed by first name' },
  'older-sister':    { characters: '姊', romanization: 'Ze',     pronunciation: 'Tse',  breakdown: 'Your older sister',    side: 'self', guaranteed: true },
  'younger-sister':  { characters: '妹', romanization: 'Mue',    pronunciation: 'Mweh', breakdown: 'Your younger sister',  side: 'self', guaranteed: true, addressByName: true, note: 'Junior relatives may also be addressed by first name' },

function countryColor(code) {
  if (CURATED_COLORS[code]) return CURATED_COLORS[code];
  var h = 0;
  for (var i = 0; i < String(code).length; i++) h = (h * 31 + String(code).charCodeAt(i)) % 9973;
  return FALLBACK_COLORS[h % FALLBACK_COLORS.length];
}
function countryName(code) { return COUNTRY_NAMES[code] || code; }

/* Codes actually present in the data, largest group first — charts only ever
   show what exists, whatever the full list contains. */
function presentCountries(counts) {
  return Object.keys(counts || {})
    .filter(function (k) { return counts[k]; })
    .sort(function (a, b) { return counts[b] - counts[a] || countryName(a).localeCompare(countryName(b)); });
}

/* Alphabetical for the pickers, so people can type to jump */
function allCountryCodes() {
  return Object.keys(COUNTRY_NAMES).sort(function (a, b) {
    return COUNTRY_NAMES[a].localeCompare(COUNTRY_NAMES[b]);
  });
}

/* ══════════════════════════════════════════════════════════════════════════
   KINSHIP ENGINE
   Terms are a function of two people and the graph between them — never of a
   fixed "ego". relate(fromId, toId) re-anchors on `from`, so asking what Ming
   calls someone is the same computation as asking what Mei calls them.

   Two consequences fall out of this rather than being special-cased:
   · Siblings share parents, so they share every term outside their sibling set.
   · Generation outranks age. Someone a generation below you uses your title
     even if they are older in years; age only decides terms within a generation.
   ══════════════════════════════════════════════════════════════════════════ */

/* ── Graph accessors ─────────────────────────────────────────────────────── */
function edges() { return STATE.edges || []; }

function parentsOf(id) {
  return edges().filter(function (e) { return e.type === 'parent' && e.b === id; })
                .map(function (e) { return e.a; });
}
function childrenOf(id) {
  return edges().filter(function (e) { return e.type === 'parent' && e.a === id; })
                .map(function (e) { return e.b; });
}
function spouseOf(id) {
  var e = edges().filter(function (e) { return e.type === 'spouse' && (e.a === id || e.b === id); })[0];
  return e ? (e.a === id ? e.b : e.a) : null;
}
/* Full siblings: everyone sharing at least one parent. Explicit sibling edges
   are expanded into a shared virtual parent at load time (see normalizeEdges),
   so this one definition covers both cases. */
function siblingsOf(id) {
  var out = {};
  parentsOf(id).forEach(function (p) {
    childrenOf(p).forEach(function (c) { if (c !== id) out[c] = true; });
  });
  return Object.keys(out);
}

/* A `sibling` edge means "these two are siblings but their parents aren't in
   the tree". Expanding it into a shared virtual parent keeps every downstream
   calculation on one code path — critically, it keeps generation depth honest,
   which treating siblings as depth-equal does not. Virtual parents have no
   layout position, so they never render and never appear in people lists. */
function normalizeEdges(rawEdges) {
  var out = rawEdges.slice();
  rawEdges.forEach(function (e) {
    if (e.type !== 'sibling') return;
    var sharesParent = parentsOfIn(out, e.a).some(function (p) {
      return parentsOfIn(out, e.b).indexOf(p) !== -1;
    });
    if (sharesParent) return;
    var vp = '__vp:' + [e.a, e.b].sort().join('+');
    out.push({ type: 'parent', a: vp, b: e.a, virtual: true });
    out.push({ type: 'parent', a: vp, b: e.b, virtual: true });
  });
  return out.filter(function (e) { return e.type !== 'sibling'; });
}
function parentsOfIn(list, id) {
  return list.filter(function (e) { return e.type === 'parent' && e.b === id; })
             .map(function (e) { return e.a; });
}
function isVirtual(id) { return typeof id === 'string' && id.indexOf('__vp:') === 0; }

/* Ancestors as { id: depth }, walking parent edges only. */
function ancestorMap(id) {
  var seen = {}, frontier = [{ id: id, d: 0 }], guard = 0;
  while (frontier.length && guard++ < 5000) {
    var cur = frontier.shift();
    if (seen[cur.id] !== undefined && seen[cur.id] <= cur.d) continue;
    seen[cur.id] = cur.d;
    parentsOf(cur.id).forEach(function (p) { frontier.push({ id: p, d: cur.d + 1 }); });
  }
  return seen;
}

/* Shortest blood link: how many generations up from each side to a shared point. */
function linkDepths(fromId, toId) {
  var af = ancestorMap(fromId), at = ancestorMap(toId);
  var best = null;
  Object.keys(af).forEach(function (id) {
    if (at[id] === undefined) return;
    var cand = { via: id, dF: af[id], dT: at[id], total: af[id] + at[id] };
    if (!best || cand.total < best.total ||
        (cand.total === best.total && Math.abs(cand.dF - cand.dT) < Math.abs(best.dF - best.dT))) {
      best = cand;
    }
  });
  return best;
}

var RANK_NUMERALS = [

/* Eldest takes 大 Tua, youngest takes 細 Soi, everyone between takes a numeral.

   `alwaysRank` decides what happens to a set of one. For your parent's own
   siblings the single-relative exception applies — with one maternal uncle there
   is nobody to rank against, so he is simply 舅 Gu. For a parent's cousin the
   prefix marks their seniority within their own sibling line, so the eldest
   takes 大 even when they are the only one of their gender.
   OPEN: confirm against the Terms database — this is the Betty / Raymond case. */
function rankPrefix(position, total, alwaysRank) {
  if (total <= 1) return alwaysRank ? RANK_NUMERALS[1] : null;
  if (position === 1) return RANK_NUMERALS[1];
  if (position === total) return RANK_SMALL;
  return RANK_NUMERALS[position] || null;
}

function byBirthOrder(ids) {
  return ids.slice().sort(function (x, y) {
    var px = getPerson(x), py = getPerson(y);
    var ox = px && px.birthOrder != null ? px.birthOrder : 999;
    var oy = py && py.birthOrder != null ? py.birthOrder : 999;
    if (ox !== oy) return ox - oy;
    var yx = px && px.birthYear != null ? px.birthYear : 9999;
    var yy = py && py.birthYear != null ? py.birthYear : 9999;
    return yx - yy;
  });
}

/* Builds the ranked term for an uncle/aunt within their own sibling set.
   `pool` is the set they are ranked against (e.g. all of mother's brothers). */
function rankedTerm(targetId, pool, base, side, breakdown, noteExtra, alwaysRank) {
  var ordered = byBirthOrder(pool);
  var position = ordered.indexOf(targetId) + 1;
  var prefix = rankPrefix(position, ordered.length, alwaysRank);

  var term = {
    characters: base.c, romanization: base.r, pronunciation: base.p,
    breakdown: breakdown, side: side, guaranteed: true
  };

  if (!prefix) {
    term.note = ordered.length === 1
      ? 'Only one in this set, so no rank prefix is used — just ' + base.c + ' ' + base.r + '.'
      : noteExtra;
    return term;
  }

  term.characters = prefix.c + base.c;
  term.romanization = prefix.r + '-' + base.r;
  term.pronunciation = prefix.r + '-' + base.p;
  term.rankLabel = position + (position === 1 ? 'st' : position === 2 ? 'nd' : position === 3 ? 'rd' : 'th') +
    ' of ' + ordered.length + ' ' + (side === 'maternal' ? 'maternal' : 'paternal') + ' ' + base.setName +
    (position === ordered.length ? ' (youngest)' : '');
  term.rankSequence = ordered.map(function (id, i) {
    var p = rankPrefix(i + 1, ordered.length, alwaysRank);
    return {
      characters: (p ? p.c : '') + base.c,
      romanization: (p ? p.r + '-' : '') + base.r,
      label: p ? p.label : '—',
      isCurrent: i + 1 === position
    };
  });
  term.note = prefix.c + ' ' + prefix.r + ' + ' + base.c + ' ' + base.r + '. ' + (noteExtra || '');
  return term;
}

function clone(t, over) {
  var o = {};
  Object.keys(t).forEach(function (k) { o[k] = t[k]; });
  Object.keys(over || {}).forEach(function (k) { o[k] = over[k]; });

/* Which side of the family does `viaId` sit on, from `fromId`'s view?
   Returns null when both parents connect (your own siblings and descendants),
   since those belong to no single side. */
function sideVia(fromId, viaId) {
  var ps = parentsOf(fromId);
  var matches = ps.filter(function (p) {
    return p === viaId || ancestorMap(p)[viaId] !== undefined || sharesAncestor(p, viaId);
  });
  if (matches.length !== 1) return null;
  var p = getPerson(matches[0]);
  return p && p.gender === 'male' ? 'paternal' : 'maternal';
}

/* Relative age within the same generation. Returns 'older' | 'younger' | null. */
/* 堂 or 表 is decided by surname, which in practice means: cousins through your
   father's *brother* share your surname and take 堂; every other cousin takes 表.
   Returns null when a gender is unrecorded rather than guessing a prefix. */
function cousinPrefix(fromId, toId) {
  var mine = parentsOf(fromId), theirs = parentsOf(toId);
  for (var i = 0; i < mine.length; i++) {
    var sibs = siblingsOf(mine[i]);
    for (var j = 0; j < theirs.length; j++) {
      if (sibs.indexOf(theirs[j]) === -1) continue;
      var p = getPerson(mine[i]), q = getPerson(theirs[j]);
      if (!p || !q) continue;
      var pk = p.gender === 'male' || p.gender === 'female';
      var qk = q.gender === 'male' || q.gender === 'female';
      if (!pk || !qk) return null;             // don't guess a prefix
      return (p.gender === 'male' && q.gender === 'male')
        ? { chars: '堂', rom: 'Tang', why: 'through your father\u2019s brother, so you share a surname' }
        : { chars: '表', rom: 'Bieu', why: 'through a married-out line, so the surnames differ' };
    }
  }
  return null;
}

var COUSIN_STEM = {

function relativeAge(fromId, toId) {
  var a = getPerson(fromId), b = getPerson(toId);
  if (!a || !b) return null;
  if (a.birthYear != null && b.birthYear != null && a.birthYear !== b.birthYear) {
    return b.birthYear < a.birthYear ? 'older' : 'younger';
  }
  if (a.birthOrder != null && b.birthOrder != null && a.birthOrder !== b.birthOrder) {
    var sharedParents = parentsOf(fromId).filter(function (p) { return parentsOf(toId).indexOf(p) !== -1; });
    if (sharedParents.length) return b.birthOrder < a.birthOrder ? 'older' : 'younger';
  }
  return null;
}

/* ── The engine ──────────────────────────────────────────────────────────── */
/* Returns a term object, or null when the relationship falls outside what the
   rules can verify. Never guesses. */
function relate(fromId, toId) {
  if (!fromId || !toId) return null;
  if (fromId === toId) {
    return { characters: '我', romanization: 'Ua', pronunciation: 'Wah',
             breakdown: 'Yourself — the anchor of the tree', side: 'self', guaranteed: true, isSelf: true };
  }

  return relateBlood(fromId, toId);
}

function relateBlood(fromId, toId) {
  var link = linkDepths(fromId, toId);
  if (!link) return null;

  var dF = link.dF, dT = link.dT, via = link.via;
  var side = sideVia(fromId, toId) || sideVia(fromId, via);
  var toP = getPerson(toId);
  var male = toP && toP.gender === 'male';

  /* Almost every Teochew term splits on gender — 伯 or 姑, 兄 or 姊. Where it
     isn't recorded the term genuinely isn't knowable, so nothing is returned
     rather than defaulting to one and quietly being wrong half the time. */
  var genderKnown = toP && (toP.gender === 'male' || toP.gender === 'female');
  var needsGender = !(dF === 0 || (dF === 1 && dT > 1));   // descendants collapse to 孫
  if (!genderKnown && needsGender) return null;

  /* ── Direct ancestors ── */
  if (dT === 0 && dF === 1) {
    return male
      ? clone(TERM_TABLE.father, {})
      : clone(TERM_TABLE.mother, {});
  }
  if (dT === 0 && dF === 2) {
    return clone(TERM_TABLE[grandparentTermKey(side, male)], {});
  }
  if (dT === 0 && dF === 3) {
    return clone(TERM_TABLE[male ? 'great-grandfather' : 'great-grandmother'], { side: side || undefined });
  }
  if (dT === 0 && dF === 4) {
    return clone(TERM_TABLE[male ? 'great-great-grandfather' : 'great-great-grandmother'], { side: side || undefined });
  }
  if (dT === 0 && dF > 4) {
    // Beyond the fourth ascending generation there is no settled address term
    return null;
  }

  /* ── Descendants ── */
  if (dF === 0) {
    if (dT >= 3) {
      return clone(TERM_TABLE['great-grandchild'], {
        breakdown: dT === 3 ? 'Your great-grandchild'
                            : 'Your descendant, ' + dT + ' generations down',
        note: TERM_TABLE['great-grandchild'].note +
              (dT > 3 ? ' Generations below this one are not separately distinguished here.' : '')
      });
    }
    return clone(TERM_TABLE.grandchild, {
      breakdown: dT === 1 ? 'Your child' : 'Your grandchild'
    });
  }

  /* ── Same generation ── */
  if (dF === dT) {
    var age = relativeAge(fromId, toId);
    if (!age) return null;                     // can't verify who is older
    var isSibling = dF === 1;
    var k = isSibling
      ? (age === 'older' ? (male ? 'older-brother' : 'older-sister')
                         : (male ? 'younger-brother' : 'younger-sister'))
      : (age === 'older' ? (male ? 'cousin-older-male' : 'cousin-older-female')
                         : (male ? 'cousin-younger-male' : 'cousin-younger-female'));
    var t = clone(TERM_TABLE[k], {});
    if (!isSibling) {
      t.breakdown = (dF === 2 ? '' : 'Second ') + t.breakdown;
      var pre = dF === 2 ? cousinPrefix(fromId, toId) : null;
      var stem = COUSIN_STEM[k];
      if (pre && stem) {
        t.descriptiveLabel = pre.chars + stem.c + ' ' + pre.rom + '-' + stem.r;
        t.descriptiveWhy = 'This cousin is ' + pre.why + '.';
      }
      t.note = 'You address a cousin exactly as you would a sibling. ' +
               (pre ? 'The ' + pre.chars + ' form below says which line they come through — '
                    + 'it describes the relationship rather than replacing what you call them.'
                    : 'The 堂/表 form needs both linking parents\u2019 genders recorded.');
    }
    return t;
  }

  /* ── One generation up: parent's sibling ── */
  if (dF === 2 && dT === 1) {
    return parentSiblingTerm(fromId, toId, side, male);
  }

  /* ── One generation down: sibling's child, cousin's child ── */
  if (dF === 1 || (dF === 2 && dT === 3) || dT > dF) {
    return clone(TERM_TABLE.grandchild, {
      breakdown: dF === 1 ? "Your sibling's child" : 'A relative one generation below you'
    });
  }

  /* ── Two generations up ── */
  if (dF === 3 && dT === 1) {
    // Grandparent's sibling — Lau- 老 steps one generation up
    var g = male
      ? { characters: '老丈', romanization: 'Lau-die[n]', pronunciation: 'Lao-deen', breakdown: "Husband of your grandmother's sister" }
      : { characters: '老姨', romanization: 'Lau-yi', pronunciation: 'Lao-yee', breakdown: "Your grandmother's sister" };
    return {
      characters: g.characters, romanization: g.romanization, pronunciation: g.pronunciation,
      breakdown: g.breakdown, side: side, guaranteed: true,
      note: 'Lau- 老 (grand) applied to the parent-generation term, stepping one generation up.'
    };
  }

  /* ── Parent's cousin — sits in the parent generation, so takes 姨/舅 ── */
  if (dF === 3 && dT === 2) {
    return parentSiblingTerm(fromId, toId, side || 'maternal', male, true);
  }

  return null;
}

/* Uncle/aunt terms, including the birth-rank prefix. */
function parentSiblingTerm(fromId, toId, side, male, isParentCousin) {
  var linkingParent = parentsOf(fromId).filter(function (p) {
    return ancestorMap(p)[toId] !== undefined || siblingsOf(p).indexOf(toId) !== -1 ||
           ancestorMap(toId)[p] !== undefined || sharesAncestor(p, toId);
  })[0];

  var pool, note;
  if (isParentCousin) {
    // Ranked within their own sibling set, not merged with your parent's siblings
    pool = [toId].concat(siblingsOf(toId)).filter(function (id) {
      var p = getPerson(id);
      return p && (p.gender === 'male') === male;
    });
    note = "Your parent's cousin sits in the parent generation, so the parent-generation term applies. " +
           'Ranked within their own sibling set.';
  } else {
    var parentSibs = linkingParent ? siblingsOf(linkingParent) : [];
    pool = parentSibs.filter(function (id) {
      var p = getPerson(id);
      return p && (p.gender === 'male') === male;
    });
    if (pool.indexOf(toId) === -1) pool = pool.concat([toId]);
  }

  if (side === 'maternal') {
    // 舅 Gu / 姨 Yi — ranked within the sibling set, not by age against your mother
    return rankedTerm(toId, pool, male ? BASE.gu : BASE.yi, 'maternal',
      isParentCousin
        ? ("Your mother's cousin — addressed in the parent generation")
        : ("Your mother's " + (male ? 'brother' : 'sister')),
      note, isParentCousin);
  }

  // Paternal: 伯 / 叔 split by age against your father; 姑 for sisters
  if (!male) {
    return rankedTerm(toId, pool, BASE.gou, 'paternal', "Your father's sister", note);
  }
  var age = linkingParent ? relativeAge(linkingParent, toId) : null;
  if (!age) return null;
  var base = age === 'older' ? BASE.be : BASE.zeg;
  var t = {
    characters: base.c, romanization: base.r, pronunciation: base.p,
    breakdown: "Your father's " + (age === 'older' ? 'older' : 'younger') + ' brother',
    side: 'paternal', guaranteed: true,
    note: 'Prefix A- in casual address: A-' + base.r.toLowerCase() + '. ' +
          '伯 Be and 叔 Zeg split by age against your father, not by rank within the sibling set.'
  };
  return t;
}

function sharesAncestor(x, y) {
  var ax = ancestorMap(x), ay = ancestorMap(y);
  return Object.keys(ax).some(function (id) { return ay[id] !== undefined; });
}

/* Spouse-of-relative terms, derived from the blood relative's term. */
/* The in-law terms 姆 / 嬸 / 妗 / 丈 all encode "the wife of" or "the husband
   of", so which one applies depends on the PARTNER's own gender — not on an
   assumption about who their partner is.

   Where both are the same gender, Teochew has no settled term: the traditional
   set was built around opposite-sex marriage. Rather than inventing one or
   returning nothing, the partner borrows their spouse's own term as a stand-in,
   marked provisional so the interface can say plainly that it may be wrong. */
function spouseTermFor(bloodTerm, bloodId, spouseId, fromId) {
  var blood = getPerson(bloodId), spouse = getPerson(spouseId);
  if (!spouse) return null;
  var spouseKnown = spouse.gender === 'male' || spouse.gender === 'female';
  var bloodKnown = blood && (blood.gender === 'male' || blood.gender === 'female');
  if (!spouseKnown) return null;                    // nothing claimed until you answer

  var c = bloodTerm.characters;

  /* Your own household has its own in-law terms, more specific than borrowing
     the blood relative's. Checked in order of closeness — a child first, since
     a child is also addressed as 孫 and would otherwise be caught below. */
  if (fromId) {
    var link = linkDepths(fromId, bloodId);

    if (link && link.dF === 0 && link.dT === 1) {            // your child
      if (!bloodKnown) return null;                          // son or daughter decides it
      return clone(TERM_TABLE[blood.gender === 'male' ? 'daughter-in-law' : 'son-in-law'], {});
    }

    if (link && link.dF === 1 && link.dT === 1) {            // your sibling
      if (!bloodKnown) return null;
      var sibAge = relativeAge(fromId, bloodId);
      if (!sibAge) return null;              // every sibling-spouse term turns on age
      var sibIsBrother = blood.gender === 'male';
      var key = sibIsBrother
        ? (sibAge === 'older' ? 'brother-wife' : 'younger-brother-wife')
        : (sibAge === 'older' ? 'elder-sister-husband' : 'younger-sister-husband');
      var sibTerm = clone(TERM_TABLE[key], {});

      // The established terms all assume an opposite-sex marriage: 嫂 is a
      // brother's *wife*, 姊夫 an elder sister's *husband*. When the spouse's
      // own gender doesn't match that assumption there is no attested term, so
      // the closest one is offered and plainly marked as uncertain rather than
      // presented as correct.
      var expected = sibIsBrother ? 'female' : 'male';
      if (spouse.gender !== expected) {
        var sibWord = sibIsBrother
          ? (sibAge === 'older' ? 'elder brother' : 'younger brother')
          : (sibAge === 'older' ? 'elder sister' : 'younger sister');
        var spouseWord = spouse.gender === 'female' ? 'wife' : 'husband';
        return clone(sibTerm, {
          guaranteed: false,
          provisional: true,
          breakdown: 'The ' + spouseWord + ' of your ' + sibWord +
                     ' \u2014 borrowing the term for ' + (/^[aeiou]/i.test(sibWord) ? 'an ' : 'a ') + sibWord + '\u2019s ' +
                     (sibIsBrother ? 'wife' : 'husband'),
          note: 'There is no established Teochew term for a same-sex spouse here. ' +
                'This borrows the closest one and may not be what your family says.'
        });
      }
      return sibTerm;
    }

    /* 孫婿 covers the spouse of anyone else you address as 孫 — a grandchild,
       a nephew, a niece — and doesn't depend on that person's own gender. */
    if (c === TERM_TABLE.grandchild.characters) {
      return clone(TERM_TABLE['grandchild-spouse'], {});
    }
  }

  if (!bloodKnown) return null;
  var sameSex = blood.gender === spouse.gender;

  if (!sameSex) {
    // Lau- 老 marks the grandparent generation and carries into the spouse term
    if (/^老/.test(c)) {
      return { characters: '老丈', romanization: 'Lau-die[n]', pronunciation: 'Lao-deen',
               breakdown: "Husband of your grandmother's sister", side: bloodTerm.side, guaranteed: true,
               note: 'Lau- 老 (grand) applied to 丈 Die[n], stepping one generation up.' };
    }
    if (/伯/.test(c)) return clone(TERM_TABLE['paternal-uncle-older-wife'], {});
    if (/叔/.test(c)) return clone(TERM_TABLE['paternal-uncle-younger-wife'], {});
    if (/舅/.test(c)) return clone(TERM_TABLE['maternal-uncle-wife'], {});
    if (/姑/.test(c)) return clone(TERM_TABLE['paternal-aunt-husband'], {});
    if (/姨/.test(c)) return clone(TERM_TABLE['maternal-aunt-husband'], {});
    return null;
  }

  // Same-sex or unstated partner — borrow the general term, and say so
  var partnerWord = spouse.gender === 'female' ? 'wife' : 'husband';
  var theirWord = blood.gender === 'female' ? 'aunt' : 'uncle';
  var base = stripRank(bloodTerm);

  return clone(bloodTerm, {
    characters: base.characters,
    romanization: base.romanization,
    pronunciation: base.pronunciation,
    guaranteed: false,
    provisional: true,
    rankLabel: undefined,
    rankSequence: undefined,
    descriptiveLabel: undefined,
    descriptiveWhy: undefined,
    breakdown: 'The ' + partnerWord + ' of your ' + theirWord +
      ' — borrowing the general term for an ' + theirWord,
    note: 'Teochew has no established term for the ' + partnerWord + ' of an ' + theirWord +
      ' in this case. It falls back to the general ' + base.characters + ' ' + base.romanization +
      ' so there is something to say, but it may well not be what your family uses. ' +
      'Please treat it as a placeholder and add the term you actually use.'
  });
}

/* Drops a birth-rank prefix (大 / 二 / 細 …) to leave the general term. Rank
   says which uncle among his brothers — it means nothing for someone who
   married in, so the stand-in uses the plain form. */
function stripRank(term) {
  var m = /^[大二三四五六七八九細](.+)$/.exec(term.characters);
  if (!m) return { characters: term.characters, romanization: term.romanization,
                   pronunciation: term.pronunciation };
  var rom = term.romanization.indexOf('-') !== -1
    ? term.romanization.slice(term.romanization.indexOf('-') + 1) : term.romanization;
  var pro = term.pronunciation && term.pronunciation.indexOf('-') !== -1
    ? term.pronunciation.slice(term.pronunciation.indexOf('-') + 1) : term.pronunciation;
  return { characters: m[1], romanization: rom, pronunciation: pro };
}

/* Someone who married into your generation is addressed with a sibling term.
   Age decides which one — measured against the speaker where both birth years
   are known, and falling back to the seniority of the blood relative who links
   them when they aren't. */
function generationSpouseTerm(fromId, toId, viaId, bloodTerm) {
  var toP = getPerson(toId);
  if (!toP) return null;
  // 兄 or 姊, 弟 or 妹 — the term splits on gender, so an unanswered card must
  // yield nothing. Reading "unset" as female is how a new partner silently
  // arrived as 妹.
  if (toP.gender !== 'male' && toP.gender !== 'female') return null;
  var male = toP.gender === 'male';

  var age = relativeAge(fromId, toId);
  var basis;
  if (age) {
    basis = 'Older or younger is measured against you directly.';
  } else {
    // Fall back to the linking relative's rank: an elder cousin's spouse is elder
    age = /[兄姊]/.test(bloodTerm.characters) ? 'older' : 'younger';
    basis = 'Birth years are missing, so this follows the seniority of ' +
            displayName(getPerson(viaId)) + ', who links you.';
  }

  var key = age === 'older' ? (male ? 'older-brother' : 'older-sister')
                            : (male ? 'younger-brother' : 'younger-sister');
  var t = clone(TERM_TABLE[key], {});
  t.breakdown = displayName(getPerson(viaId)) + "'s " + (male ? 'husband' : 'wife') +
    ' — addressed as ' + (age === 'older' ? 'an elder' : 'a younger') + ' sibling';
  t.note = 'Marrying into your generation places them in it. You address ' +
    displayName(getPerson(viaId)) + ' as a sibling, so their ' + (male ? 'husband' : 'wife') +
    ' takes the matching sibling term. ' + basis;
  t.derivedFrom = viaId;
  return t;
}

/* ── Public resolution ───────────────────────────────────────────────────── */
function termBetween(fromId, toId) {
  var ov = STATE.termOverrides[toId];
  if (ov && fromId === STATE.egoId) {
    return { characters: ov.characters, romanization: ov.romanization,
             pronunciation: ov.pronunciation || '', breakdown: 'User-confirmed term', guaranteed: true };
  }

  var t = relate(fromId, toId);
  if (t) return t;

  // Spouse-of-a-blood-relative
  var sp = spouseOf(toId);
  if (sp) {
    var bloodTerm = relate(fromId, sp);
    if (bloodTerm) {
      var st = spouseTermFor(bloodTerm, sp, toId, fromId);
      if (st) { st.derivedFrom = sp; return st; }

      // Marrying into your own generation puts you in it. If you address the
      // blood relative as a sibling, their husband or wife is addressed as one
      // too — so your mother's cousin calls your father 兄 or 弟 by age.
      if (/^[兄弟姊妹]$/.test(bloodTerm.characters)) {
        var inGen = generationSpouseTerm(fromId, toId, sp, bloodTerm);
        if (inGen) return inGen;
      }
    }
  }

  var mySpouse = spouseOf(fromId);

  /* Anyone a generation or more above addresses everyone below them as 孫 Sung —
     it doesn't distinguish sides or blood, so it reaches across a marriage too.
     Your father's brother's wife calls you 孫; so does your father, speaking of
     your mother's nephew. Only this junior term travels this way: the senior
     in-law terms (大伯 and the like) are a separate set this version doesn't
     cover, so nothing else is inferred through a spouse. */
  if (mySpouse) {
    var juniorVia = relate(mySpouse, toId);
    if (juniorVia && juniorVia.characters === TERM_TABLE.grandchild.characters) {
      return clone(juniorVia, {
        breakdown: 'Junior to you by a generation — through ' + displayName(getPerson(mySpouse)),
        note: TERM_TABLE.grandchild.note + ' It applies to anyone a generation below you, ' +
              'whether they are related to you by blood or through your marriage.'
      });
    }
  }

  // And the mirror of the sibling rule: a blood relative of your own spouse who
  // sits in your generation is addressed as a sibling too, so the pair agree.
  if (mySpouse) {
    var throughSpouse = relate(mySpouse, toId);
    if (throughSpouse && /^[兄弟姊妹]$/.test(throughSpouse.characters)) {
      var mirrored = generationSpouseTerm(fromId, toId, mySpouse, throughSpouse);
      if (mirrored) {
        mirrored.breakdown = displayName(getPerson(mySpouse)) + "'s " +
          (getPerson(toId).gender === 'male' ? 'male' : 'female') + ' cousin — addressed as a sibling';
        return mirrored;
      }
    }
  }

  // Trees built by onboarding declare roles directly
  var p = getPerson(toId);
  if (p && p.role && TERM_TABLE[p.role]) return clone(TERM_TABLE[p.role], {});

  return null;
}

/* Term as seen from the current anchor (the ego of the loaded tree). */
function resolveTerm(personId) {
  return termBetween(STATE.egoId, personId);
}

function roleOf(personId) {
  var p = getPerson(personId);
  return (p && p.role) || PERSON_ROLES[personId] || '';
}

/* Lineage color is derived from the graph: which side of the anchor's family
   this person sits on. Falls back to the declared role for onboarding-built trees. */
function lineageColor(personId) {
  if (personId === STATE.egoId) return C.paternal;
  if (STATE.edges && STATE.edges.length) {
    var side = sideVia(STATE.egoId, personId);
    if (!side) {
      var sp = spouseOf(personId);
      if (sp) side = sideVia(STATE.egoId, sp);
    }
    if (side === 'paternal') return C.paternal;
    if (side === 'maternal') return C.maternal;
    // Same-generation blood relatives with no parental side = your own siblings
    var link = linkDepths(STATE.egoId, personId);
    if (link && link.dF === link.dT) return C.self;
  }
  var role = roleOf(personId);
  if (role.indexOf('paternal') === 0 || PATERNAL_IDS.indexOf(personId) !== -1) return C.paternal;
  if (role.indexOf('maternal') === 0 || MATERNAL_IDS.indexOf(personId) !== -1) return C.maternal;
  return C.self;
}

function describeRelationship(personId) {
  if (personId === STATE.egoId) return 'You — the center of the tree';
  var t = STATE.edges && STATE.edges.length ? termBetween(STATE.egoId, personId) : null;
  if (t && t.breakdown) return t.breakdown;
  var role = roleOf(personId);
  if (role && RELATIONSHIP_TEXT[role]) return RELATIONSHIP_TEXT[role];
  return EXTENDED_TEXT[personId] || 'Relative';
}

function sideLabel(color) {
  if (color === C.paternal) return 'Paternal';
  if (color === C.maternal) return 'Maternal';
  return 'Your side';
}

function displayName(p) { return p.nickname || p.name; }

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

      '<p style="font-size:13px;color:' + C.muted + ';line-height:1.6;margin:0">' +
      esc(term.note || 'Junior relatives (younger in both age and generation) are addressed by first name in Teochew.') +
      '</p></div>';
  }

  var h = '<div class="card" style="overflow:hidden">';
  h += '<div style="height:4px;background:' + (term.provisional ? C.self : sideColor) + '"></div>';
  h += '<div style="padding:' + (compact ? '18px' : '26px') + '">';

  if (term.provisional) {
    h += '<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:14px;padding:10px 12px;' +
      'border-radius:10px;background:rgba(200,164,90,0.16);border:1px solid rgba(200,164,90,0.45)">' +
      '<span style="color:' + C.self + ';font-size:13px;line-height:1.3">⚠</span>' +
      '<div><div style="font-size:12px;color:#6B5B45;font-weight:500;margin-bottom:2px">' +
      'Stand-in term — this may not be right</div>' +
      '<div style="font-size:11.5px;color:' + C.muted + ';line-height:1.55">' +
      'Teochew has no settled term for this relationship. Treat it as a placeholder.</div></div></div>';
  }

  if (opts.relationshipLabel) {
    h += '<p style="font-size:12px;color:' + C.muted + ';margin:0 0 ' + (compact ? '10px' : '14px') + ';letter-spacing:.04em">' +
      esc(opts.relationshipLabel) + '</p>';
  }

  h += '<div class="han" style="text-align:center;font-size:' + (compact ? '64px' : '100px') +
    ';line-height:1;letter-spacing:.04em;margin-bottom:' + (compact ? '6px' : '10px') + ';user-select:none">' +
    esc(term.characters) + '</div>';

  h += '<div class="serif" style="text-align:center;font-size:' + (compact ? '20px' : '28px') +
    ';font-weight:500;color:' + sideColor + ';margin-bottom:4px">' + esc(term.romanization) + '</div>';

  h += '<div style="text-align:center;margin-bottom:18px;font-size:14px;color:' + C.muted + '">Say it: <em style="color:' +
    C.ink + '">' + esc(term.pronunciation) + '</em></div>';

  h += '<div style="height:1px;background:rgba(42,31,20,0.08);margin-bottom:14px"></div>';

  if (!compact) {
    h += '<div style="margin-bottom:14px"><div class="eyebrow" style="margin-bottom:5px">Breakdown</div>' +
      '<div style="font-size:14px;line-height:1.6">' + esc(term.breakdown) + '</div></div>';
    h += rankStripHtml(term);
    h += grandparentStyleHtml(term);
    if (term.descriptiveLabel) {
      h += '<div style="margin-bottom:14px;padding:13px 16px;border-radius:12px;' +
        'background:rgba(42,31,20,0.045);border:1px solid rgba(42,31,20,0.09)">' +
        '<div class="eyebrow" style="margin-bottom:6px">Descriptive form</div>' +
        '<div class="han" style="font-size:24px;line-height:1.2;margin-bottom:3px">' +
          esc(term.descriptiveLabel.split(' ')[0]) + '</div>' +
        '<div style="font-size:13px;color:' + C.paternal + ';font-weight:500;margin-bottom:6px">' +
          esc(term.descriptiveLabel.split(' ').slice(1).join(' ')) + '</div>' +
        '<div style="font-size:12px;color:' + C.muted + ';line-height:1.55">' +
          esc(term.descriptiveWhy || 'Used when describing the relationship, not when speaking to them.') +
        '</div></div>';
    }
    if (term.note) {
      h += '<div style="margin-bottom:2px;padding:10px 14px;border-radius:10px;background:rgba(42,31,20,0.04);' +
        'border:1px solid rgba(42,31,20,0.06)"><p style="font-size:12px;color:' + C.muted +
        ';line-height:1.6;margin:0">' + esc(term.note) + '</p></div>';
    }
  }

  h += '</div></div>';
  return h;
}

/* ══════ PERSISTENCE ════════════════════════════════════════════════════
   No backend. The tree lives in localStorage and travels as a file the person
   downloads. That means two failure modes worth designing against: browsers
   clear localStorage without warning (private windows, "clear site data",
   storage pressure), and localStorage is per-device. Neither is recoverable
   after the fact, so the app has to make exporting easy and say plainly when
   saving isn't working rather than implying the data is safe. */

/* The mark, inlined as SVG so the app stays a single file you can open from

var STORAGE_KEY   = 'kinship.tree.v1';

/* Only the durable half of STATE. UI state (which person is selected, whether
   the legend is open) is deliberately excluded — restoring it would be noise. */
function treeSnapshot() {
  return {
    people:           STATE.people,
    edges:            STATE.edges,
    egoId:            STATE.egoId,
    termOverrides:    STATE.termOverrides,
    language:         STATE.language,
    grandparentStyle: STATE.grandparentStyle,
    isDemo:           STATE.isDemo
  };
}

function applySnapshot(t) {
  STATE.people           = Array.isArray(t.people) ? t.people : [];
  STATE.edges            = Array.isArray(t.edges) ? t.edges : [];
  STATE.egoId            = t.egoId || '';
  STATE.termOverrides    = t.termOverrides || {};
  STATE.language         = t.language || 'teochew';
  STATE.grandparentStyle = GRANDPARENT_STYLES[t.grandparentStyle] ? t.grandparentStyle : 'a';
  STATE.isDemo           = !!t.isDemo;
  STATE.hasTree          = STATE.people.length > 0;
  STATE.selectedId = null; STATE.bloomFilter = null; STATE.zoom = null;
  invalidateLayout();
}

/* Preferences live apart from the tree, so loading someone else's file doesn't
   reset your own backup history. */
var PREFS = { lastExportCount: null, snoozedAtCount: null };
function loadPrefs() {
  try { var raw = localStorage.getItem(PREFS_KEY); if (raw) PREFS = JSON.parse(raw) || PREFS; } catch (err) {}
}
function savePrefs() { try { localStorage.setItem(PREFS_KEY, JSON.stringify(PREFS)); } catch (err) {} }

/* The realistic way someone loses their tree is not a bug — it's clearing their
   browser months later. A download is the only thing that survives that, so the
   app asks once the tree is worth enough effort to hurt, and again only after
   it has grown substantially since the last copy. Dismissing is not permanent,
   but it does buy a real amount of silence. */
var NUDGE_FIRST = 15;   // people before the first ask
var NUDGE_GROWTH = 10;  // people added since the last copy before asking again

function backupNudge() {
  if (!STATE.hasTree || STATE.isDemo || STATE.saveBlocked) return null;
  if (STATE.route !== 'tree') return null;
  var n = STATE.people.length;
  var floor = Math.max(PREFS.lastExportCount || 0, PREFS.snoozedAtCount || 0);
  if (PREFS.lastExportCount == null && PREFS.snoozedAtCount == null) {
    return n >= NUDGE_FIRST ? { kind: 'first', n: n } : null;
  }
  if (n - floor < NUDGE_GROWTH) return null;
  return { kind: PREFS.lastExportCount == null ? 'first' : 'stale',
           n: n, since: n - (PREFS.lastExportCount || 0) };
}

function backupNudgeHtml() {
  var nudge = backupNudge();
  if (!nudge) return '';
  var msg = nudge.kind === 'first'
    ? 'Your tree has ' + nudge.n + ' people in it. It lives only in this browser — ' +
      'clearing your browsing data would erase it.'
    : 'You have added ' + nudge.since + ' ' + (nudge.since === 1 ? 'person' : 'people') +
      ' since your last saved copy.';
  return '<div class="nudge">' +
    '<span class="han" style="font-size:20px;color:' + C.paternal + ';flex-shrink:0">家</span>' +
    '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;margin-bottom:2px">' +
      'Keep a copy of your tree</div>' +
    '<div style="font-size:12px;color:' + C.muted + ';line-height:1.5">' + esc(msg) + '</div></div>' +
    '<button class="btn-primary" data-act="download-tree" style="flex-shrink:0;padding:9px 16px;font-size:13px">' +
      'Download</button>' +
    '<button data-act="snooze-nudge" title="Not now" style="flex-shrink:0;background:none;border:none;' +
      'cursor:pointer;color:' + C.faint + ';font-size:18px;padding:0 4px;line-height:1">×</button>' +
    '</div>';
}

var saveTimer = null;
function persist() {
  if (!STATE.hasTree || !STATE.people.length) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function () {
    // Re-check on the way out, not just on the way in. A save scheduled while a
    // tree existed must not land after the tree has been erased — that would
    // resurrect data the person explicitly asked to destroy.
    if (!STATE.hasTree || !STATE.people.length) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        format: FILE_FORMAT, schemaVersion: SCHEMA_VERSION,
        savedAt: new Date().toISOString(), tree: treeSnapshot()
      }));
      if (STATE.saveBlocked) { STATE.saveBlocked = false; render(); }
    } catch (err) {
      // Quota exceeded, or storage disabled (Safari private mode throws here).
      if (!STATE.saveBlocked) { STATE.saveBlocked = true; render(); }
    }
  }, 250);
}

function restore() {
  var raw;
  try { raw = localStorage.getItem(STORAGE_KEY); } catch (err) { STATE.saveBlocked = true; return false; }
  if (!raw) return false;
  try {
    var doc = JSON.parse(raw);
    var t = doc && doc.tree;
    if (!t || !Array.isArray(t.people) || !t.people.length) return false;
    applySnapshot(t);
    return true;
  } catch (err) { return false; }
}

function clearSaved() {
  clearTimeout(saveTimer);          // cancel anything already in flight
  try { localStorage.removeItem(STORAGE_KEY); } catch (err) {}
}

/* ── Export ── */
function exportFilename() {
  var ego = getPerson(STATE.egoId);
  var who = ego && ego.name ? ego.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') : 'family';
  var d = new Date(), pad = function (n) { return (n < 10 ? '0' : '') + n; };
  return 'kinship-' + who + '-' + d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + '.json';
}

function downloadTree() {
  var doc = {
    format: FILE_FORMAT,
    schemaVersion: SCHEMA_VERSION,
    exportedAt: new Date().toISOString(),
    // A plain-language header, because this file may be opened years from now
    // by someone who has never heard of this app.
    about: 'A Kinship family tree. Open kinship (the app) and choose Import to load it. ' +
           'The data below is plain JSON and readable without the app.',
    peopleCount: STATE.people.length,
    tree: treeSnapshot()
  };
  var blob = new Blob([JSON.stringify(doc, null, 2)], { type: 'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = exportFilename();
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  PREFS.lastExportCount = STATE.people.length;
  PREFS.snoozedAtCount = null;
  savePrefs();
  STATE.justSaved = Date.now(); render();
  setTimeout(function () { if (Date.now() - STATE.justSaved >= 2400) { STATE.justSaved = 0; render(); } }, 2500);
}

/* Dropping the file straight onto the window is how most people on a laptop
   will actually do this, and it skips the file picker entirely. */
function initDropTarget() {
  var depth = 0;
  function show(on) {
    var el = document.getElementById('dropzone');
    if (on && !el) {
      el = document.createElement('div');
      el.id = 'dropzone'; el.className = 'dropzone';
      el.innerHTML = '<div><div class="han" style="font-size:34px;color:#BF5A35;margin-bottom:10px">家</div>' +
        '<div style="font-family:Lora,serif;font-size:19px;color:#2A1F14">Drop to load this tree</div>' +
        '<div style="font-size:12.5px;color:#8A7A68;margin-top:6px">' +
        'You will see what is in it before anything changes.</div></div>';
      document.body.appendChild(el);
    } else if (!on && el) { el.remove(); }
  }
  window.addEventListener('dragenter', function (e) {
    if (!e.dataTransfer || Array.prototype.indexOf.call(e.dataTransfer.types || [], 'Files') === -1) return;
    e.preventDefault(); depth++; show(true);
  });
  window.addEventListener('dragover', function (e) {
    if (document.getElementById('dropzone')) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; }
  });
  window.addEventListener('dragleave', function () { depth = Math.max(0, depth - 1); if (!depth) show(false); });
  window.addEventListener('drop', function (e) {
    if (!document.getElementById('dropzone')) return;
    e.preventDefault(); depth = 0; show(false);
    var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) readTreeFile(f);
  });
}

/* ── Import ── */
function readTreeFile(file) {
  var reader = new FileReader();
  reader.onload = function () {
    var parsed = parseTreeDoc(String(reader.result));
    if (parsed.error) { STATE.importError = parsed.error; STATE.modal = 'import-confirm'; STATE.pendingImport = null; }
    else { STATE.pendingImport = parsed.tree; STATE.importError = ''; STATE.modal = 'import-confirm'; }
    render();
  };
  reader.onerror = function () {
    STATE.importError = 'That file could not be read.'; STATE.pendingImport = null;
    STATE.modal = 'import-confirm'; render();
  };
  reader.readAsText(file);
}

/* Validate before replacing anything. An import that silently wipes a tree the
   person spent an hour on is the worst thing this app could do to them. */
function parseTreeDoc(text) {
