  if (doc.schemaVersion && doc.schemaVersion > SCHEMA_VERSION) {
    return { error: 'That file was saved by a newer version of Kinship (format ' +
                    doc.schemaVersion + '). Update the app, then try again.' };
  }
  var ids = {};
  for (var i = 0; i < t.people.length; i++) {
    var p = t.people[i];
    if (!p || !p.id) return { error: 'That file is damaged — one of the people has no identifier.' };
    ids[p.id] = true;
  }
  var edges = Array.isArray(t.edges) ? t.edges : [];
  var dangling = 0;
  for (var j = 0; j < edges.length; j++) {
    var e = edges[j];
    if (!e || (!ids[e.a] && String(e.a).indexOf('__vp:') !== 0) || (!ids[e.b] && String(e.b).indexOf('__vp:') !== 0)) dangling++;
  }
  return { tree: {
    people: t.people, edges: edges, egoId: ids[t.egoId] ? t.egoId : (t.people[0] && t.people[0].id),
    termOverrides: t.termOverrides || {}, language: t.language, grandparentStyle: t.grandparentStyle,
    isDemo: !!t.isDemo, _dangling: dangling, _egoRemapped: !ids[t.egoId]
  } };
}

function triggerImportPicker() {
  var input = document.createElement('input');
  input.type = 'file';
  // Deliberately not restricted to .json — iOS and some Android pickers grey out
  // files whose type they don't recognise, which makes a valid backup look
  // corrupt. Better to accept anything and explain clearly if it isn't a tree.
  input.accept = '';
  input.onchange = function () { if (input.files && input.files[0]) readTreeFile(input.files[0]); };
  input.click();
}

/* ══════ TREE ══════════════════════════════════════════════════════════ */

function lineVisible(side) {
  if (side === 'marriage') return STATE.showMarriages;
  if (STATE.sideFilter === 'all') return true;
  if (side === 'self') return true;
  return side === STATE.sideFilter;
}

function nodeOpacity(id) {
  if (STATE.sideFilter === 'all') return 1;
  if (id === STATE.egoId) return 1;
  if (id === 'bro-older' || id === 'sis-younger') return 1;
  var color = lineageColor(id);
  if (STATE.sideFilter === 'paternal' && color === C.paternal) return 1;
  if (STATE.sideFilter === 'maternal' && color === C.maternal) return 1;
  return 0.10;
}


/* ══════════════════════════════════════════════════════════════════════════
   SMOOTH CONNECTORS
   The original layout drew each link as three separate primitives — a drop, a
   sibling bar and a stub — which met at hard right angles and, because they were
   hardcoded, could drift out of alignment with the nodes. These are now derived
   from the graph and drawn as one continuous rounded path per child, so a link
   can never be disconnected from the people it joins.
   ══════════════════════════════════════════════════════════════════════════ */

var CORNER_R = 11;   // corner radius where the bus meets a drop or a stub

/* One continuous path: down from the junction, along the bus, into the child. */
function connectorPath(jx, jy, cx, cy, busY) {
  if (Math.abs(cx - jx) < 0.5) return 'M ' + jx + ',' + jy + ' L ' + cx + ',' + cy;

  var dir = cx > jx ? 1 : -1;
  var run = Math.abs(cx - jx);
  // Never let a corner eat more than it has room for
  var r = Math.min(CORNER_R, run / 2, Math.abs(busY - jy), Math.abs(cy - busY));

  return 'M ' + jx + ',' + jy +
         ' L ' + jx + ',' + (busY - r) +
         ' Q ' + jx + ',' + busY + ' ' + (jx + dir * r) + ',' + busY +
         ' L ' + (cx - dir * r) + ',' + busY +
         ' Q ' + cx + ',' + busY + ' ' + cx + ',' + (busY + r) +
         ' L ' + cx + ',' + cy;
}

/* ══════════════════════════════════════════════════════════════════════════
   ACTIVE LAYOUT
   NODE_POSITIONS is the hand-tuned full layout. When married-in relatives are
   hidden the tree genuinely reflows: people are removed, then each sibling group
   is repacked and re-centered under its parents, top row down. Connectors are
   derived from whatever this returns, so they follow automatically.
   ══════════════════════════════════════════════════════════════════════════ */
var _posCache = null, _posKey = '';
function invalidateLayout() { _posCache = null; _posKey = ''; }

/* The side filter and the marriage toggle are My Family view controls. Ask and
   Bloom have their own reasons to show or hide people, and inheriting a filter
   set on another tab makes them look broken — relatives silently missing with
   no visible control explaining why. The controls only render on My Family, so
   the setting is neutralised while the other two screens build their markup and
   restored immediately after. */
function withFamilyViewNeutral(fn) {
  var sf = STATE.sideFilter, sm = STATE.showMarriages;
  if (sf === 'all' && sm) return fn();          // nothing to neutralise
  STATE.sideFilter = 'all';
  STATE.showMarriages = true;
  invalidateLayout();                            // the layout is keyed on both
  try {
    return fn();
  } finally {
    STATE.sideFilter = sf;
    STATE.showMarriages = sm;
    invalidateLayout();
  }
}

function POS() {
  var key = (STATE.isDemo ? 'demo' : 'gen') + '|' + (STATE.showMarriages ? 'all' : 'blood') +
            '|' + STATE.egoId + '|' + STATE.people.length;
  if (_posCache && _posKey === key) return _posCache;
  _posKey = key;
  try {
    if (!STATE.isDemo) _posCache = generateLayout();
    else _posCache = STATE.showMarriages ? NODE_POSITIONS : computeBloodLayout();
  } catch (err) {
    _posCache = STATE.isDemo ? NODE_POSITIONS : {};   // never let a layout bug blank the tree
  }
  return _posCache;
}

/* ══════════════════════════════════════════════════════════════════════════
   GENERATED LAYOUT
   A tree built through onboarding has no hand-tuned coordinates, so positions
   are derived from the graph: generations become rows, sibling groups are
   packed and centered under their parents, couples sit together. This replaces
   the circular fallback, which overlapped nodes and clipped every label.
   ══════════════════════════════════════════════════════════════════════════ */
var ROW_GAP = 180;
var COUPLE_DROP = 64;    // how far the ego's parents sit below their siblings

function generationOf(egoId) {
  var gen = {}, queue = [egoId], guard = 0;
  gen[egoId] = 0;
  while (queue.length && guard++ < 5000) {
    var cur = queue.shift();
    parentsOf(cur).forEach(function (p) {
      if (gen[p] === undefined) { gen[p] = gen[cur] - 1; queue.push(p); }
    });
    childrenOf(cur).forEach(function (c) {
      if (gen[c] === undefined) { gen[c] = gen[cur] + 1; queue.push(c); }
    });
    var sp = spouseOf(cur);
    if (sp && gen[sp] === undefined) { gen[sp] = gen[cur]; queue.push(sp); }
  }
  return gen;
}

function generateLayout() {
  var ego = STATE.egoId;
  if (!ego || !STATE.people.length) return {};

  var gen = generationOf(ego);
  var visible = STATE.people
    .map(function (p) { return p.id; })
    .filter(function (id) {
      if (gen[id] === undefined) return false;                 // unreachable
      return STATE.showMarriages || isBloodRelative(id);
    });
  if (!visible.length) return {};

  var order = {};                       // stable tiebreak: the order people were added
  STATE.people.forEach(function (p, i) { order[p.id] = i; });

  var out = {};
  visible.forEach(function (id) {
    out[id] = { x: 0, y: gen[id] * ROW_GAP, r: id === ego ? 30 : 21 };
  });

  var levels = [];
  visible.forEach(function (id) { if (levels.indexOf(gen[id]) === -1) levels.push(gen[id]); });
  levels.sort(function (a, b) { return a - b; });

  function membersOf(lvl) { return visible.filter(function (id) { return gen[id] === lvl; }); }
  function halfOf(id) { return Math.max(out[id].r, plateHalfFor(id)); }

  function spread(ids, center) {
    var widths = ids.map(halfOf), gaps = [];
    for (var i = 1; i < ids.length; i++) gaps.push(widths[i - 1] + widths[i] + 22);
    var span = gaps.reduce(function (a, b) { return a + b; }, 0);
    var cursor = center - span / 2;
    ids.forEach(function (id, i) {
      if (i > 0) cursor += gaps[i - 1];
      out[id].x = cursor;
    });
  }

  /* ── Blocks ─────────────────────────────────────────────────────────────
     A sibling set moves as one. Keeping them rigid is what stops the two sides
     of the family from interleaving: without it a childless aunt stays where
     she was while her married siblings slide across to sit above their own
     children, and the paternal and maternal lines end up shuffled together. */
  function blocksFor(lvl) {
    var members = membersOf(lvl);
    var blocks = [], byKey = {}, blockOf = {}, loose = [];

    members.forEach(function (id) {
      if (!isBloodRelative(id) && spouseOf(id)) { loose.push(id); return; }   // married in
      var ps = parentsOf(id);
      var key = ps.length ? 'p:' + ps.slice().sort().join('+') : 'solo:' + id;
      if (!byKey[key]) { byKey[key] = { key: key, ids: [], blood: [] }; blocks.push(byKey[key]); }
      byKey[key].ids.push(id);
      byKey[key].blood.push(id);
      blockOf[id] = byKey[key];
    });

    loose.forEach(function (id) {
      var sp = spouseOf(id);
      var host = sp && blockOf[sp];
      if (host) { host.ids.push(id); blockOf[id] = host; }
      else {
        var b = { key: 'x:' + id, ids: [id], blood: [id] };
        blocks.push(b); blockOf[id] = b;
      }
    });

    // Birth order inside the block, each partner tucked in beside their spouse
    blocks.forEach(function (b) {
      var ordered = [];
      byBirthOrder(b.blood).forEach(function (id) {
        ordered.push(id);
        var sp = spouseOf(id);
        if (sp && b.ids.indexOf(sp) !== -1 && ordered.indexOf(sp) === -1) ordered.push(sp);
      });
      b.ids.forEach(function (id) { if (ordered.indexOf(id) === -1) ordered.push(id); });
      b.ids = ordered;

      /* Which side of the family this block belongs to. Rows are ordered
         paternal → your own line → maternal, so the two sides stay in their own
         halves of the tree instead of shuffling together whenever a block
         happens to want a position on the far side. */
      var sides = b.blood.map(function (id) { return sideVia(ego, id); })
                         .filter(function (x) { return !!x; });
      b.side = sides.indexOf('paternal') !== -1 ? 0
             : sides.indexOf('maternal') !== -1 ? 2 : 1;
    });
    return blocks;
  }

  function edgesOf(b) {
    b.left = Math.min.apply(null, b.ids.map(function (id) { return out[id].x - halfOf(id); }));
    b.right = Math.max.apply(null, b.ids.map(function (id) { return out[id].x + halfOf(id); }));
  }

  /* Order blocks by where they want to be, then push them apart as whole units */
  function settle(blocks) {
    blocks.forEach(edgesOf);
    blocks.sort(function (a, b) {
      if (a.side !== b.side) return a.side - b.side;      // paternal, yours, maternal
      return a.want - b.want;
    });
    for (var i = 1; i < blocks.length; i++) {
      var gap = (blocks[i - 1].right + 40) - blocks[i].left;
      if (gap > 0) {
        blocks[i].ids.forEach(function (id) { out[id].x += gap; });
        blocks[i].left += gap; blocks[i].right += gap;
      }
    }
  }

  /* ── Pass 1: top-down, so every row has a sane starting arrangement ──── */
  var cursor = 0;
  levels.forEach(function (lvl) {
    var blocks = blocksFor(lvl);
    blocks.forEach(function (b) {
      var ps = [];
      b.blood.forEach(function (id) {
        parentsOf(id).forEach(function (p) { if (out[p] !== undefined && ps.indexOf(p) === -1) ps.push(p); });
      });
      b.want = ps.length
        ? ps.reduce(function (s, p) { return s + out[p].x; }, 0) / ps.length
        : (cursor += 300) - 300;
      spread(b.ids, b.want);
      // Center on the blood siblings, so partners riding along don't drag the set
      if (b.blood.length !== b.ids.length) {
        var mid = b.blood.reduce(function (s, id) { return s + out[id].x; }, 0) / b.blood.length;
        var fix = b.want - mid;
        b.ids.forEach(function (id) { out[id].x += fix; });
      }
    });
    settle(blocks);
  });

  /* ── Pass 2: ancestors sit above their own descendants ───────────────────
     Working upward from your generation. The topmost row has no parents to
     hang from, so without this it drifts to wherever a cursor left it — which
     is how a maternal great-great-grandparent ended up over the paternal line. */
  levels.filter(function (l) { return l < 0; })
        .sort(function (a, b) { return b - a; })
        .forEach(function (lvl) {
    var blocks = blocksFor(lvl);
    blocks.forEach(function (b) {
      var kids = [];
      b.ids.forEach(function (id) {
        childrenOf(id).forEach(function (k) { if (out[k] !== undefined && kids.indexOf(k) === -1) kids.push(k); });
      });
      b.want = kids.length
        ? kids.reduce(function (s, k) { return s + out[k].x; }, 0) / kids.length
        : b.ids.reduce(function (s, id) { return s + out[id].x; }, 0) / b.ids.length;
      spread(b.ids, b.want);
    });
    settle(blocks);
  });

  /* ── Your parents, pulled together ──────────────────────────────────────
     They sit in two different sibling blocks, so packing leaves them at
     opposite ends of the row. Room is made sideways rather than by dropping
     them a step, which would eat the gap to the next generation. */
  var egoParents = parentsOf(ego).filter(function (id) { return out[id]; });
  if (egoParents.length === 2 && out[egoParents[0]].y === out[egoParents[1]].y) {
    var pA = egoParents[0], pB = egoParents[1];
    var want = halfOf(pA) + halfOf(pB) + 24;
    if (Math.abs(out[pA].x - out[pB].x) > want + 1) {
      var leftId = out[pA].x <= out[pB].x ? pA : pB;
      var rightId = leftId === pA ? pB : pA;
      var mid = (out[pA].x + out[pB].x) / 2;
      out[leftId].x = mid - want / 2;
      out[rightId].x = mid + want / 2;

      var row = membersOf(gen[pA]).filter(function (id) { return id !== pA && id !== pB; });
      var lefties = row.filter(function (id) { return out[id].x < mid; })
                       .sort(function (a, b) { return out[a].x - out[b].x; });
      var righties = row.filter(function (id) { return out[id].x >= mid; })
                        .sort(function (a, b) { return out[a].x - out[b].x; });
      var edge = out[leftId].x - halfOf(leftId);
      for (var li = lefties.length - 1; li >= 0; li--) {
        var limit = edge - halfOf(lefties[li]) - 22;
        if (out[lefties[li]].x > limit) out[lefties[li]].x = limit;
        edge = out[lefties[li]].x - halfOf(lefties[li]);
      }
      edge = out[rightId].x + halfOf(rightId);
      for (var ri = 0; ri < righties.length; ri++) {
        var minX = edge + halfOf(righties[ri]) + 22;
        if (out[righties[ri]].x < minX) out[righties[ri]].x = minX;
        edge = out[righties[ri]].x + halfOf(righties[ri]);
      }
    }
  }

  /* ── Pass 3: your generation and below re-hang under their settled parents ── */
  levels.filter(function (l) { return l >= 0; })
        .sort(function (a, b) { return a - b; })
        .forEach(function (lvl) {
    var blocks = blocksFor(lvl);
    blocks.forEach(function (b) {
      var ps = [];
      b.blood.forEach(function (id) {
        parentsOf(id).forEach(function (p) { if (out[p] !== undefined && ps.indexOf(p) === -1) ps.push(p); });
      });
      b.want = ps.length
        ? ps.reduce(function (s, p) { return s + out[p].x; }, 0) / ps.length
        : b.ids.reduce(function (s, id) { return s + out[id].x; }, 0) / b.ids.length;
      spread(b.ids, b.want);
      if (b.blood.length !== b.ids.length) {
        var mid = b.blood.reduce(function (s, id) { return s + out[id].x; }, 0) / b.blood.length;
        var fix = b.want - mid;
        b.ids.forEach(function (id) { out[id].x += fix; });
      }
    });
    settle(blocks);
  });

  // Center the whole tree on the ego
  var shift = out[ego] ? out[ego].x : 0;
  Object.keys(out).forEach(function (id) { out[id].x -= shift; });
  return out;
}

/* Is this person related to the anchor by blood, or only by marriage? */
function isBloodRelative(id) {
  if (id === STATE.egoId) return true;
  return !!linkDepths(STATE.egoId, id);
}

function computeBloodLayout() {
  var base = NODE_POSITIONS;
  var visible = Object.keys(base).filter(function (id) {
    return getPerson(id) && isBloodRelative(id);
  });
  if (!visible.length) return base;

  var out = {};
  visible.forEach(function (id) { out[id] = { x: base[id].x, y: base[id].y, r: base[id].r }; });

  // Rows, topmost first, so parents are placed before their children
  var rows = [];
  visible.forEach(function (id) { if (rows.indexOf(base[id].y) === -1) rows.push(base[id].y); });
  rows.sort(function (a, b) { return a - b; });

  var placed = {};
  rows.forEach(function (y, rowIdx) {
    var members = visible.filter(function (id) { return base[id].y === y; })
                         .sort(function (a, b) { return base[a].x - base[b].x; });

    // Group siblings by their (visible) parent set
    var groups = [], byKey = {};
    members.forEach(function (id) {
      var ps = parentsOf(id).filter(function (p) { return out[p] && placed[p]; });
      var key = ps.length ? ps.slice().sort().join('+') : '@' + id;
      if (!byKey[key]) { byKey[key] = { key: key, parents: ps, ids: [] }; groups.push(byKey[key]); }
      byKey[key].ids.push(id);
    });

    // Lay each group out tightly, centered under its parents
    groups.forEach(function (g) {
      var widths = g.ids.map(function (id) { return Math.max(base[id].r, plateHalfFor(id)); });
      var gaps = [];
      for (var i = 1; i < g.ids.length; i++) gaps.push(widths[i - 1] + widths[i] + 20);
      var span = gaps.reduce(function (a, b) { return a + b; }, 0);

      var center;
      if (g.parents.length) {
        center = g.parents.reduce(function (s, p) { return s + out[p].x; }, 0) / g.parents.length;
      } else {
        center = g.ids.reduce(function (s, id) { return s + base[id].x; }, 0) / g.ids.length;
      }

      var cursor = center - span / 2;
      g.ids.forEach(function (id, i) {
        if (i > 0) cursor += gaps[i - 1];
        out[id].x = cursor;
      });
      g.left = out[g.ids[0]].x - widths[0];
      g.right = out[g.ids[g.ids.length - 1]].x + widths[widths.length - 1];
      g.widths = widths;
    });

    // Resolve overlaps between groups, left to right
    groups.sort(function (a, b) { return a.left - b.left; });
    for (var gi = 1; gi < groups.length; gi++) {
      var prev = groups[gi - 1], cur = groups[gi];
      var overlap = (prev.right + 34) - cur.left;
      if (overlap > 0) {
        cur.ids.forEach(function (id) { out[id].x += overlap; });
        cur.left += overlap; cur.right += overlap;
      }
    }

    members.forEach(function (id) { placed[id] = true; });
  });

  return out;
}

/* Plate half-width that works off the base layout, for use during layout */
function plateHalfFor(id) {
  var person = getPerson(id);
  if (!person) return 20;
  var term = resolveTerm(id);
  var isEgo = id === STATE.egoId;
  var cand = [{ t: displayName(person).split(' ')[0], s: 11.5 }];
  if (term && !isEgo) {
    cand.push({ t: term.romanization, s: 10 });
    if (term.pronunciation && term.pronunciation !== '—') cand.push({ t: term.pronunciation, s: 8.5 });
  }
  var widest = cand.reduce(function (m, c) { return Math.max(m, c.t.length * c.s * 0.56); }, 0);
  return (widest + 14) / 2;
}

/* How wide is the label plate under a node? Mirrors labelPlate()'s sizing. */
function plateHalfWidth(id) {
  var person = getPerson(id);
  if (!person) return 0;
  var term = resolveTerm(id);
  var isEgo = id === STATE.egoId;
  var cand = [{ t: displayName(person).split(' ')[0], s: 11.5 }];
  if (term && !isEgo) {
    cand.push({ t: term.romanization, s: 10 });
    if (term.pronunciation && term.pronunciation !== '—') cand.push({ t: term.pronunciation, s: 8.5 });
  }
  var widest = cand.reduce(function (m, c) { return Math.max(m, c.t.length * c.s * 0.56); }, 0);
  return (widest + 14) / 2;
}

/* Marriage brackets: a soft arc rather than a flat dash between the pair.
   Long spans arc high enough to clear any node standing between the couple,
   so a sibling in the middle never looks like the spouse. */
function marriagePath(x1, y, x2) {
  var mid = (x1 + x2) / 2, span = Math.abs(x2 - x1);
  var lift = Math.max(8, Math.min(46, span * 0.20));

  var lo = Math.min(x1, x2), hi = Math.max(x1, x2);
  var lay = POS();
  Object.keys(lay).forEach(function (id) {
    var p = lay[id];
    if (p.y !== y) return;
    if (p.x <= lo + 1 || p.x >= hi - 1) return;
    lift = Math.max(lift, p.r + 22);      // arc over the intervening node
  });
  return 'M ' + x1 + ',' + y + ' Q ' + mid + ',' + (y - lift * 1.35) + ' ' + x2 + ',' + y;
}

/* Derives every connector in the tree from the graph + the layout positions. */
function buildConnectors() {
  var out = { drops: [], marriages: [] };
  var pos = POS();
  var seenCouple = {};

  // ── Marriages ──
  edges().forEach(function (e) {
    if (e.type !== 'spouse') return;
    if (!STATE.showMarriages) return;      // hidden means gone, not just faded
    var pa = pos[e.a], pb = pos[e.b];
    if (!pa || !pb) return;
    out.marriages.push({
      d: marriagePath(Math.min(pa.x, pb.x), pa.y, Math.max(pa.x, pb.x)),
      color: C.marriage, w: 1.8, op: 0.6, dashed: true, side: 'marriage',
      a: e.a, b: e.b
    });
  });

  // ── Sibling links with no modelled parents (e.g. A-ma and her sister) ──
  edges().forEach(function (e) {
    if (e.type !== 'sibling') return;
    var pa = pos[e.a], pb = pos[e.b];
    if (!pa || !pb) return;
    var lo = Math.min(pa.x, pb.x), hi = Math.max(pa.x, pb.x);
    out.marriages.push({
      d: 'M ' + lo + ',' + (pa.y - 26) + ' Q ' + ((lo + hi) / 2) + ',' + (pa.y - 40) + ' ' + hi + ',' + (pb.y - 26),
      color: C.maternal, w: 1.2, op: 0.30, dashed: false, side: 'maternal',
      a: e.a, b: e.b
    });
  });

  // ── Parent → child, grouped by parent couple so siblings share one bus ──
  var groups = {};
  edges().forEach(function (e) {
    if (e.type !== 'parent') return;
    if (!pos[e.a] || !pos[e.b]) return;
    // With marriages hidden there is no couple to hang a shared junction from,
    // so each parent links to their children on their own — otherwise the drop
    // would descend from an empty gap between two unconnected people.
    var sp = STATE.showMarriages ? spouseOf(e.a) : null;
    var coupleKey = sp && pos[sp] ? [e.a, sp].sort().join('+') : e.a;
    groups[coupleKey] = groups[coupleKey] || { parents: {}, children: {} };
    groups[coupleKey].parents[e.a] = true;
    if (sp && pos[sp]) groups[coupleKey].parents[sp] = true;
    groups[coupleKey].children[e.b] = true;
  });

  Object.keys(groups).forEach(function (key) {
    var g = groups[key];
    var parentIds = Object.keys(g.parents);
    var childIds = Object.keys(g.children);
    if (!parentIds.length || !childIds.length) return;

    // Junction sits at the midpoint of the couple, on their baseline
    var jx = parentIds.reduce(function (s, id) { return s + pos[id].x; }, 0) / parentIds.length;
    var jy = pos[parentIds[0]].y;

    // A couple's midpoint often lands on a sibling standing between them, which
    // makes the drop look like it belongs to the wrong parent. Prefer the
    // children's midpoint when the couple's own midpoint is occupied.
    // A node's footprint is the wider of its circle and its label plate — the
    // plate sits directly below and is exactly what a drop line would clip.
    function occupiedAt(x) {
      return Object.keys(pos).some(function (id) {
        if (parentIds.indexOf(id) !== -1) return false;
        var p = pos[id];
        if (p.y !== jy) return false;
        return Math.abs(p.x - x) < Math.max(p.r, plateHalfFor(id)) + 7;
      });
    }
    if (occupiedAt(jx)) {
      var childMid = childIds.reduce(function (s, id) { return s + pos[id].x; }, 0) / childIds.length;
      if (!occupiedAt(childMid)) {
        jx = childMid;
      } else {
        // Both preferred columns are blocked — step outwards from the children's
        // midpoint until a clear one is found, so the drop never crosses a node.
        for (var off = 8; off <= 160; off += 8) {
          if (!occupiedAt(childMid - off)) { jx = childMid - off; break; }
          if (!occupiedAt(childMid + off)) { jx = childMid + off; break; }
        }
      }
    }

    // The bus sits midway between the bottom of the parents and the top of the
    // children, so it never crowds either row regardless of node radius.
    var parentBottom = Math.max.apply(null, parentIds.map(function (id) { return pos[id].y + pos[id].r; }));
    var childTop = Math.min.apply(null, childIds.map(function (id) { return pos[id].y - pos[id].r; }));
    var busY = parentBottom + (childTop - parentBottom) / 2;

    // A group owned by one parent takes that parent's lineage color, so when
    // marriages are hidden the two parents' lines stay tellable apart.
    var col = parentIds.length === 1 ? lineageColor(parentIds[0]) : lineageColor(childIds[0]);

    // Which side a link belongs to is decided by the CHILDREN, never by a
    // parent. Your own sibling group descends from both parents at once, so it
    // sits on no single side — falling back to a parent tagged it "paternal",
    // and the maternal filter then hid the line joining you to your mother.
    // Anything that can't be attributed to one side stays visible.
    var side = sideVia(STATE.egoId, childIds[0]) || 'self';

    // Start the drop below the parents' baseline, not at their centers — a couple's
    // midpoint often lands on top of a sibling node sitting between them.
    var startY = parentBottom;

    childIds.forEach(function (cid) {
      var cp = pos[cid];
      var isEgoLine = cid === STATE.egoId;
      out.drops.push({
        d: connectorPath(jx, startY, cp.x, cp.y - cp.r, busY),
        color: col,
        w: isEgoLine ? 2.4 : cp.r >= 21 ? 2.0 : 1.6,
        op: isEgoLine ? 0.62 : 0.42,
        side: side || 'self',
        parents: parentIds, child: cid
      });
    });
  });

  return out;
}

/* ══════════════════════════════════════════════════════════════════════════
   NODE LABELS
   Name, romanization and pronunciation sit on a faint plate. The plate is
   opaque enough to mask any connector running behind it, so text never has to
   compete with a line for legibility.
   ══════════════════════════════════════════════════════════════════════════ */
function labelPlate(pos, person, term, color, isEgo) {
  var name = displayName(person).split(' ')[0];
  var rom = term ? term.romanization : '';
  var pron = term && term.pronunciation && term.pronunciation !== '—' ? term.pronunciation : '';
  if (isEgo) { rom = ''; pron = ''; }

  var lines = [
    { text: name, size: 11.5, fill: C.ink, weight: '500', family: "'DM Sans',sans-serif" }
  ];
  if (rom)  lines.push({ text: rom,  size: 10,  fill: color,   weight: '500', family: "Lora,serif", italic: true });
  if (pron) lines.push({ text: pron, size: 8.5, fill: C.faint, weight: '400', family: "'DM Sans',sans-serif" });

  // Approximate text width — enough for a plate that always clears its content
  var widest = lines.reduce(function (m, l) {
    return Math.max(m, l.text.length * l.size * 0.56);
  }, 0);
  var padX = 7, padY = 5, lineGap = 2;
  var contentH = lines.reduce(function (h, l) { return h + l.size + lineGap; }, 0) - lineGap;
  var w = widest + padX * 2, h = contentH + padY * 2;
  var top = pos.y + pos.r + 9;
  var x = pos.x - w / 2;

  var out = '<g>';
  out += '<rect x="' + x.toFixed(1) + '" y="' + top.toFixed(1) + '" width="' + w.toFixed(1) +
    '" height="' + h.toFixed(1) + '" rx="6" fill="' + C.bg + '" fill-opacity="0.92" stroke="' + color +
    '" stroke-opacity="0.20" stroke-width="1"></rect>';

  var cursor = top + padY;
  lines.forEach(function (l) {
    cursor += l.size;
    out += '<text x="' + pos.x + '" y="' + (cursor - l.size * 0.22).toFixed(1) + '" text-anchor="middle" fill="' +
      l.fill + '" font-size="' + l.size + '" font-weight="' + l.weight + '" font-family="' + l.family + '"' +
      (l.italic ? ' font-style="italic"' : '') + '>' + esc(l.text) + '</text>';
    cursor += lineGap;
  });
  out += '</g>';
  return out;
}

/* Hops from the anchor to everyone else, walking parent and spouse links.
   Used by the Bloom view so the tree opens outward from you. */
function hopDistance(fromId) {
  var dist = {}, queue = [fromId], guard = 0;
  dist[fromId] = 0;
  while (queue.length && guard++ < 4000) {
    var cur = queue.shift();
    var next = parentsOf(cur).concat(childrenOf(cur));
    var sp = spouseOf(cur);
    if (sp) next.push(sp);
    next.forEach(function (n) {
      if (dist[n] === undefined) { dist[n] = dist[cur] + 1; queue.push(n); }
    });
  }
  return dist;
}

function treeSvg(opts) {

  var spotlight = opts.spotlight || null;   // dashboard filter: dim non-matching people
  var nodeAct = opts.nodeAct || 'pick-node'; // Connect Two reuses the tree as a picker

  /* The paternal/maternal filter belongs to My Family. On the Ask page you need

  var sideFilterOn = !opts.ignoreSideFilter;
  function visibleSide(side) { return sideFilterOn ? lineVisible(side) : true; }

  TREE_W = BOX.w; TREE_H = BOX.h;           // keep zoom in step with the drawing area

  var s = '';

  computeLanes().forEach(function (lane) {
    s += '<g><rect x="-3000" y="' + lane.yTop + '" width="7000" height="' + (lane.yBottom - lane.yTop) +
      '" fill="' + lane.color + '"></rect>' +
      '<text x="' + (BOX.x + 10) + '" y="' + (lane.yTop + 14) + '" fill="rgba(42,31,20,0.20)" font-size="9" letter-spacing="0.10em">' +
      lane.label.toUpperCase() + '</text>' +
      '<line x1="-3000" y1="' + lane.yBottom + '" x2="4000" y2="' + lane.yBottom +

  var conn = buildConnectors();

     anchored to the two specific people in each step. Reusing the shared

  var chainPaths = [];

      var i = seg.order !== undefined ? seg.order : idx;
      var a = LAY[seg.from], b = LAY[seg.to];
      if (!a || !b) return;

      if (seg.kind === 'spouse' || a.y === b.y) {

          d: 'M ' + a.x + ',' + (a.y - a.r) + ' Q ' + ((a.x + b.x) / 2) + ',' +
             (a.y - a.r - lift) + ' ' + b.x + ',' + (b.y - b.r) });
        return;
      }

      // Parent above, child below — trace down, across the bus, and in
      var up = a.y < b.y ? a : b, down = a.y < b.y ? b : a;
      var busY = (up.y + up.r) + ((down.y - down.r) - (up.y + up.r)) / 2;

      } else {

            ' Q ' + up.x + ',' + busY + ' ' + (up.x + dir * r) + ',' + busY +
            ' L ' + (down.x - dir * r) + ',' + busY +
            ' Q ' + down.x + ',' + busY + ' ' + down.x + ',' + (busY + r) +
            ' L ' + down.x + ',' + (down.y - down.r);

      ' style="animation:drawline .42s ease ' + (0.12 + order * 0.3).toFixed(2) + 's forwards"';
  }

  // Marriage + sibling brackets first, so parent drops sit on top
  conn.marriages.forEach(function (m) {
    if (!visibleSide(m.side)) return;
    s += revealOpen(m.b) + '<path d="' + m.d + '" fill="none" stroke="' + m.color +
      '" stroke-width="' + m.w + '" stroke-linecap="round"' +
      (m.dashed ? ' stroke-dasharray="5 4"' : '') +
      ' opacity="' + connOpacity(m.op) + '"></path>' + revealClose();
  });

  conn.drops.forEach(function (d) {
    if (!visibleSide(d.side)) return;
    s += revealOpen(d.child) + '<path d="' + d.d + '" fill="none" stroke="' + d.color +
      '" stroke-width="' + d.w + '" stroke-linecap="round" stroke-linejoin="round"' +
      ' opacity="' + connOpacity(d.op) + '"></path>' + revealClose();
  });

  // The lit route, drawn over the faded tree
  chainPaths.sort(function (a, b) { return a.order - b.order; });
  chainPaths.forEach(function (cp) {
    s += '<path d="' + cp.d + '" fill="none" stroke="' + C.ink + '" stroke-width="' + cp.w +
      '" stroke-linecap="round" stroke-linejoin="round" opacity="0.62"' + drawOn(cp.order) + '></path>';
  });

  var clips = '';
  Object.keys(LAY).forEach(function (id) {
    var person = getPerson(id);
    if (!person || !person.photo) return;
    var pos = LAY[id];
    clips += '<clipPath id="clip-' + id + '"><circle cx="' + pos.x + '" cy="' + pos.y + '" r="' + pos.r + '"></circle></clipPath>';
  });
  if (clips) s += '<defs>' + clips + '</defs>';

  Object.keys(LAY).forEach(function (id) {
    var person = getPerson(id);
    if (!person) return;
    var pos = LAY[id];
    var color = lineageColor(id);
    var isEgo = id === STATE.egoId;
    var selected = STATE.selectedId === id && interactive;
    var term = resolveTerm(id);
    // A question mark, not an initial — the bubble carries the term, and a
    // letter sitting there reads like an answer when there isn't one yet.
    var char = isEgo ? '我' : (term ? term.characters : '?');
    var hasPhoto = !!person.photo;
    var hasTerm = !!term;
    var op = opacityFor(id);

    var slotOf = opts.slots && (opts.slots.A === id ? 'A' : opts.slots.B === id ? 'B' : null);
    var isEndpoint = (focus && (id === focus.a || id === focus.b)) || !!slotOf;
    if (focus) op = focus.ids[id] ? 1 : 0.13;
    if (spotlight) op = spotlight[id] ? 1 : 0.12;

    s += '<g class="node"' + (interactive ? ' data-act="' + nodeAct + '" data-id="' + id + '"' : '') +
      ' opacity="' + op + '"' + revealStyle(id, 'node') + '>';

    if (isEndpoint) {
      s += '<circle cx="' + pos.x + '" cy="' + pos.y + '" r="' + (pos.r + 9) + '" fill="none" stroke="' +
        color + '" stroke-width="2.5" opacity="0.85"></circle>';
      s += '<circle cx="' + pos.x + '" cy="' + pos.y + '" r="' + (pos.r + 9) + '" fill="' + color + '" opacity="0.10"></circle>';
    }
    s += '<circle cx="' + pos.x + '" cy="' + pos.y + '" r="' + (pos.r < 20 ? pos.r + 14 : pos.r + 10) + '" fill="transparent"></circle>';
    if (selected) {
      s += '<circle cx="' + pos.x + '" cy="' + pos.y + '" r="' + (pos.r + 5) + '" fill="none" stroke="' + color +
        '" stroke-width="2" opacity="0.5"></circle>';
    }
    s += '<circle class="body" cx="' + pos.x + '" cy="' + pos.y + '" r="' + pos.r + '" fill="' +
      (hasPhoto ? 'transparent' : (isEgo || selected) ? color : C.surface) + '" stroke="' + color +
      '" stroke-width="' + (isEgo ? 0 : 2) + '"></circle>';

    if (hasPhoto) {
      s += '<image href="' + esc(person.photo) + '" x="' + (pos.x - pos.r) + '" y="' + (pos.y - pos.r) +
        '" width="' + (pos.r * 2) + '" height="' + (pos.r * 2) + '" clip-path="url(#clip-' + id +
        ')" preserveAspectRatio="xMidYMid slice"></image>';
    } else {
      var dy = pos.r > 26 ? 8 : pos.r > 15 ? 6 : 4;
      var fs = pos.r > 26 ? 20 : pos.r > 18 ? 14 : pos.r > 14 ? 11 : 9;
      s += '<text x="' + pos.x + '" y="' + (pos.y + dy) + '" text-anchor="middle" fill="' +
        ((isEgo || selected) ? '#fff' : color) + '" font-size="' + fs +
        '" font-family="Noto Serif SC, Songti SC, serif" font-weight="' + (isEgo ? 500 : 400) + '">' + esc(char) + '</text>';
    }

    s += labelPlate(pos, person, term, color, isEgo);
    if (!hasTerm && !isEgo) {
      s += '<circle cx="' + (pos.x + pos.r - 3) + '" cy="' + (pos.y - pos.r + 3) + '" r="4" fill="' + C.self + '"></circle>';
    }

    if (isEndpoint) {
      var tag = slotOf || (focus && id === focus.a ? 'A' : 'B');
      s += '<text x="' + pos.x + '" y="' + (pos.y - pos.r - 15) + '" text-anchor="middle" fill="' + color +
        '" font-size="9" font-weight="700" letter-spacing="0.08em">' + tag + '</text>';
    }
    s += '</g>';
  });

  // serves the full-screen tree, the Ask chain view and the Bloom panel.
  return '<svg data-tree-svg="1" viewBox="' + BOX.x + ' ' + BOX.y + ' ' + BOX.w + ' ' + BOX.h + '" ' +
    'style="display:block;max-width:none" xmlns="http://www.w3.org/2000/svg">' + s + '</svg>';
}

/* ══════════════════════════════════════════════════════════════════════════
   ZOOM
   The tree is 1580×990 at full size — taller than most panels — so every view
   that renders it needs to be able to scale. zoom === null means "fit the
   container", which is what each view opens at.
   ══════════════════════════════════════════════════════════════════════════ */
var TREE_W = 1580, TREE_H = 990;      // refreshed from the live layout each render

/* The drawing area, derived from wherever the people actually are. */
function layoutBounds() {
  var lay = POS(), ids = Object.keys(lay);
  if (!ids.length) return { x: -400, y: -200, w: 800, h: 400 };
  var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  ids.forEach(function (id) {
    var p = lay[id], half = Math.max(p.r, plateHalfFor(id));
    minX = Math.min(minX, p.x - half);  maxX = Math.max(maxX, p.x + half);
    minY = Math.min(minY, p.y - p.r);   maxY = Math.max(maxY, p.y + p.r + 62);  // plate sits below
  });

  return { x: minX - padX, y: minY - padY,

}

/* Generation bands, computed from the rows in use. Boundaries fall midway
   between rows, and each band is named by its distance from you. */
var GEN_LABELS = {
  '-5': 'Earlier generations', '-4': 'Great-great-grandparents', '-3': 'Great-grandparents',
  '-2': 'Grandparents', '-1': "Parents' generation", '0': 'Your generation',
  '1': 'Children', '2': 'Grandchildren', '3': 'Great-grandchildren'
};
var LANE_TINTS = ['rgba(42,31,20,0.045)', 'rgba(191,90,53,0.035)', 'rgba(191,90,53,0.055)',
                  'rgba(74,123,107,0.055)', 'rgba(200,164,90,0.065)', 'rgba(42,31,20,0.03)'];

function computeLanes() {
  var lay = POS(), ids = Object.keys(lay);
  if (!ids.length) return [];
  var egoY = lay[STATE.egoId] ? lay[STATE.egoId].y : 0;
  // Bucket by generation, not by exact y — a couple nudged below their siblings
  // still belongs to their own generation and must not open a second band.
  var buckets = {};
  ids.forEach(function (id) {
    var step = Math.round((lay[id].y - egoY) / ROW_GAP);
    if (!buckets[step]) buckets[step] = { step: step, min: lay[id].y, max: lay[id].y };
    buckets[step].min = Math.min(buckets[step].min, lay[id].y);
    buckets[step].max = Math.max(buckets[step].max, lay[id].y);

  return steps.map(function (step, i) {
    var cur = buckets[step];
    var top = i === 0 ? b.y : (buckets[steps[i - 1]].max + cur.min) / 2;
    var bottom = i === steps.length - 1 ? b.y + b.h : (cur.max + buckets[steps[i + 1]].min) / 2;
    var key = String(Math.max(-5, Math.min(3, step)));

var ZOOM_MIN = 0.18, ZOOM_MAX = 2.5;

/* Fit shows the whole tree at once — constrained by both axes, so nothing is
   left off the bottom. The swimlane bands still reach the panel edges because
   they are drawn far wider than the viewBox and the SVG fills its container. */
function fitScaleFor(box) {
  if (!box || !box.clientWidth) return 0.5;
  var byW = box.clientWidth / TREE_W;
  var byH = box.clientHeight ? box.clientHeight / TREE_H : byW;
  return clampZoom(Math.min(byW, byH));
}
function clampZoom(z) { return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z)); }

/* Applies the current zoom to every tree on screen. Called after each render. */
function applyZoom() {
  var svgs = document.querySelectorAll('[data-tree-svg]');
  for (var i = 0; i < svgs.length; i++) {
    var svg = svgs[i];
    var box = svg.closest ? svg.closest('.treebox') : svg.parentElement;

    if (STATE.zoom === null) {
      // Fill the panel and let the viewBox scale to fit inside it. The whole
      // tree is visible, centered, with no scrolling in either direction.
      svg.setAttribute('width', '100%');
      svg.setAttribute('height', '100%');
      svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      if (box) box.classList.add('fitted');
    } else {
      svg.setAttribute('width', Math.round(TREE_W * STATE.zoom));
      svg.setAttribute('height', Math.round(TREE_H * STATE.zoom));
      svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      if (box) box.classList.remove('fitted');
    }

  if (label) {
    label.textContent = STATE.zoom === null ? 'Fit' : Math.round(currentScale() * 100) + '%';
  }

function currentScale() {
  if (STATE.zoom !== null) return STATE.zoom;
  var svg = document.querySelector('[data-tree-svg]');
  return svg ? fitScaleFor(svg.closest ? svg.closest('.treebox') : svg.parentElement) : 0.5;
}

/* Continuous zoom, anchored so whatever sits under the cursor stays under it.

   The anchor has to account for the fact that a tree smaller than its panel is
   centered rather than pinned at the origin — otherwise the maths is off by the
   centring offset and the tree just grows from the corner. */
function setZoom(next, box, anchorX, anchorY) {
  var prev = currentScale();
  next = clampZoom(next);
  if (Math.abs(next - prev) < 0.0005) return;

  if (!box || anchorX === undefined) { STATE.zoom = next; applyZoom(); return; }

  // Where the cursor is in tree coordinates, before the change
  var offBefore = contentOffset(box, prev);
  var treeX = (box.scrollLeft + anchorX - offBefore.x) / prev;
  var treeY = (box.scrollTop + anchorY - offBefore.y) / prev;

  STATE.zoom = next;
  applyZoom();

  // Put that same tree point back under the cursor
  var offAfter = contentOffset(box, next);
  box.scrollLeft = treeX * next + offAfter.x - anchorX;
  box.scrollTop = treeY * next + offAfter.y - anchorY;

/* How far the scaled tree is inset inside its panel when it doesn't fill it. */
function contentOffset(box, scale) {
  var w = TREE_W * scale, h = TREE_H * scale;
  return {
    x: Math.max(0, (box.clientWidth - w) / 2),
    y: Math.max(0, (box.clientHeight - h) / 2)

/* Button and keyboard zoom move in smooth multiplicative increments */
function stepZoom(dir, box, ax, ay) {
  setZoom(currentScale() * (dir > 0 ? 1.2 : 1 / 1.2), box, ax, ay);
}

function zoomControlsHtml() {
  return '<div class="zoombar">' +
    '<button data-act="zoom-out" title="Zoom out (−)" aria-label="Zoom out">−</button>' +
    '<span id="zoomLabel">Fit</span>' +
    '<button data-act="zoom-in" title="Zoom in (+)" aria-label="Zoom in">+</button>' +
    '<button data-act="zoom-fit" title="Fit to screen (0)" class="fit">Fit</button>' +
    '</div>';

/* Every person on the shortest route between two people, for chain highlighting. */
function chainBetween(aId, bId) {
  var ids = {}, order = [];
  if (!aId || !bId) return { ids: ids, path: order, a: aId, b: bId };

  function walkUp(fromId, viaId) {
    var out = [fromId], cur = fromId, guard = 0;
    while (cur !== viaId && guard++ < 12) {
      var ps = parentsOf(cur);
      var next = ps.filter(function (p) { return ancestorMap(p)[viaId] !== undefined || p === viaId; })[0];
      if (!next) {
        var sib = siblingsOf(cur).filter(function (sx) {
          return sx === viaId || ancestorMap(sx)[viaId] !== undefined;
        })[0];
        if (!sib) break;
        next = sib;
      }
      out.push(next);
      cur = next;
    }
    return out;
  }

  // Both walks end at the shared ancestor — drop it from one side so the
  // meeting point isn't counted twice.
  function join(x, y, via) {
    return walkUp(x, via).concat(walkUp(y, via).slice(0, -1).reverse());
  }

  var connected = true, apexId = null;
  var link = linkDepths(aId, bId);
  if (link) {
    apexId = link.via;
    order = join(aId, bId, link.via);
  } else {
    // Not blood: route through whichever spouse bridges them
    var spB = spouseOf(bId), spA = spouseOf(aId);
    var l2 = spB ? linkDepths(aId, spB) : null;
    var l3 = spA ? linkDepths(spA, bId) : null;
    if (l2)      { apexId = l2.via; order = join(aId, spB, l2.via).concat([bId]); }
    else if (l3) { apexId = l3.via; order = [aId].concat(join(spA, bId, l3.via)); }
    else {
      // Genuinely unrelated. Draw no route at all rather than inventing a line
      // between two people who share no connection.
      connected = false;
      order = [];
    }
  }

  // Guard against any repeat, whatever route produced the path
  order = order.filter(function (id, i) { return i === 0 || id !== order[i - 1]; });

  /* The route climbs to a single shared ancestor, but people don't think of the
     apex as one person — it's a couple. If the ancestor the chain turns at has a
     spouse who is also a parent of the next person along, bring them in, so two
     people who meet at their grandparents see 亞公 and 亞嫲, not just 亞公. */
  var apexSpouse = null, apexAt = -1;
  if (connected && apexId && order.length > 2) {
    var at = order.indexOf(apexId);
    if (at > 0 && at < order.length - 1) {
      var sp2 = spouseOf(apexId);
      if (sp2) {
        var kids = childrenOf(sp2);
        // Only when they genuinely co-parent someone the chain passes through
        if (kids.indexOf(order[at - 1]) !== -1 || kids.indexOf(order[at + 1]) !== -1) {
          apexSpouse = sp2; apexAt = at;
        }
      }
    }
  }

  // A virtual parent joins two siblings whose real parents aren't in the tree.
  // Dropping it outright would leave a gap in the drawn route, so collapse
  // "sibling → virtual parent → sibling" into one lateral segment instead.
  var segments = [];
  for (var i = 0; i < order.length - 1; i++) {
    var from = order[i], to = order[i + 1];
    if (isVirtual(to) && order[i + 2] !== undefined) {
      segments.push({ from: from, to: order[i + 2], kind: 'sibling' });
      i++;                       // skip past the virtual node
      continue;
    }
    if (isVirtual(from) || isVirtual(to)) continue;
    segments.push({ from: from, to: to, kind: segmentKind(from, to) });
  }

  order = order.filter(function (id) { return !isVirtual(id); });
  order.forEach(function (id) { ids[id] = true; });

  // Light the apex couple's marriage, and their partner's link to the child
  if (apexSpouse) {
    ids[apexSpouse] = true;
    segments.push({ from: order[apexAt], to: apexSpouse, kind: 'spouse', order: apexAt });
    var kidsOfSpouse = childrenOf(apexSpouse);
    [order[apexAt - 1], order[apexAt + 1]].forEach(function (kid) {
      if (kid && kidsOfSpouse.indexOf(kid) !== -1) {
        segments.push({ from: apexSpouse, to: kid, kind: 'child', order: apexAt });
      }
    });
  }
  // Include spouses of anyone on the chain, so couples read as a unit
  order.slice().forEach(function (id) {
    var sp = spouseOf(id);
    if (sp && (sp === aId || sp === bId)) ids[sp] = true;
  });
  ids[aId] = true; ids[bId] = true;
  return { ids: ids, path: order, segments: segments, connected: connected, a: aId, b: bId };
}

/* What kind of link joins two adjacent people on a chain? */
function segmentKind(x, y) {
  var e = edges();
  for (var i = 0; i < e.length; i++) {
    if (e[i].type === 'parent' && e[i].a === x && e[i].b === y) return 'child';
    if (e[i].type === 'parent' && e[i].a === y && e[i].b === x) return 'parent';
    if (e[i].type === 'spouse' && ((e[i].a === x && e[i].b === y) || (e[i].a === y && e[i].b === x))) return 'spouse';
  }
  var px = parentsOf(x), py = parentsOf(y);
  if (px.some(function (p) { return py.indexOf(p) !== -1; })) return 'sibling';
  return 'link';
}

/* Plain-language chain: "Mei → her mother → her mother's brother" */
function chainNarrative(aId, bId) {
  var chain = chainBetween(aId, bId);
  if (!chain.connected) return null;
  if (chain.path.length < 2) return null;
  var names = chain.path.map(function (id) {
    var p = getPerson(id);
    return p ? displayName(p) : id;
  });
  return names.join(' → ');
}


/* ══════════════════════════════════════════════════════════════════════════
   BIRTH DATES
   Optional and partial by design — a year alone, or a month and day without a
   year, are both common when piecing family history together. Nothing here
   appears on the tree; it belongs to the person's card.
   ══════════════════════════════════════════════════════════════════════════ */
function formatBirth(p) {
  if (!p) return null;
  var md = p.birthDate ? p.birthDate.split('-') : null;
  var month = md ? MONTH_NAMES[parseInt(md[0], 10) - 1] : null;
  var day = md ? parseInt(md[1], 10) : null;
  if (month && day && p.birthYear) return day + ' ' + month + ' ' + p.birthYear;
  if (month && day) return day + ' ' + month;
  if (p.birthYear) return String(p.birthYear);
  return null;
}

/* "1932 – 1998", or "20 March 1991" for the living. Any part may be missing. */
function formatLife(p) {
  var born = formatBirth(p);
  var died = null;
  if (p.deathDate || p.deathYear) {
    var md = p.deathDate ? p.deathDate.split('-') : null;
    if (md && p.deathYear) died = parseInt(md[1], 10) + ' ' + MONTH_NAMES[parseInt(md[0], 10) - 1] + ' ' + p.deathYear;
    else if (md) died = parseInt(md[1], 10) + ' ' + MONTH_NAMES[parseInt(md[0], 10) - 1];
    else died = String(p.deathYear);
  }
  if (born && died) return born + ' — ' + died;
  if (died) return 'died ' + died;
  return born;
}
function isDeceased(p) { return !!(p && (p.deathDate || p.deathYear)); }

function ageOf(p) {
  if (!p || !p.birthYear) return null;
  var now = new Date();
  var age = now.getFullYear() - p.birthYear;
  if (p.birthDate) {
    var md = p.birthDate.split('-');
    var m = parseInt(md[0], 10), d = parseInt(md[1], 10);
    var before = (now.getMonth() + 1) < m || ((now.getMonth() + 1) === m && now.getDate() < d);
    if (before) age--;
  }
  return age >= 0 && age < 130 ? age : null;
}

function birthdayIsToday(p) {
  if (!p || !p.birthDate) return false;
  var now = new Date();
  var md = p.birthDate.split('-');
  return parseInt(md[0], 10) === now.getMonth() + 1 && parseInt(md[1], 10) === now.getDate();
}

function dateFieldsHtml(prefix, dateStr, year, label) {
  var md = dateStr ? dateStr.split('-') : ['', ''];
  var opts = ['<option value="">Month</option>'].concat(MONTH_NAMES.map(function (m, i) {
    var v = String(i + 1).padStart(2, '0');
    return '<option value="' + v + '"' + (md[0] === v ? ' selected' : '') + '>' + m + '</option>';
  })).join('');
  var box = 'padding:7px;border-radius:8px;border:1px solid rgba(42,31,20,0.18);background:' + C.bg +
            ';font-family:inherit;font-size:12px';
  return '<div class="eyebrow" style="margin-bottom:6px">' + label + '</div>' +
    '<div style="display:flex;gap:6px;margin-bottom:10px">' +
    '<select id="' + prefix + 'Month" style="flex:1.4;min-width:0;' + box + '">' + opts + '</select>' +
    '<input id="' + prefix + 'Day" type="text" inputmode="numeric" placeholder="Day" value="' +
    (md[1] ? String(parseInt(md[1], 10)) : '') + '" style="flex:.7;min-width:0;text-align:center;' + box + '" />' +
    '<input id="' + prefix + 'Year" type="text" inputmode="numeric" placeholder="Year" value="' +
    (year || '') + '" style="flex:1;min-width:0;text-align:center;' + box + '" /></div>';
}

/* The label sits above the select and stays visible after a choice is made —
   a placeholder option disappears the moment you pick something, which leaves
   two unlabelled dropdowns side by side. */
function countrySelectHtml(id, current, label) {
  var opts = ['<option value="">Not known</option>'].concat(
    allCountryCodes().map(function (k) {
      return '<option value="' + k + '"' + (current === k ? ' selected' : '') + '>' +
        esc(countryName(k)) + '</option>';
    })).join('');
  return '<div style="flex:1;min-width:0">' +
    '<div style="font-size:10.5px;color:' + C.muted + ';margin-bottom:3px">' + esc(label) + '</div>' +
    '<select id="' + id + '" style="width:100%;padding:7px;border-radius:8px;' +
    'border:1px solid rgba(42,31,20,0.18);background:' + C.bg + ';font-family:inherit;font-size:12px">' +
    opts + '</select></div>';
}

/* Someone who married in is defined by the relationship, not by a gender field:
   you know your uncle's wife as his wife. Wife and husband imply a gender the
   in-law terms need; domestic partner deliberately does not, and the term falls
   back to the general one rather than picking a gendered form on their behalf. */
var PARTNER_ROLES = [
  { key: 'wife',    label: 'Wife',    gender: 'female' },
  { key: 'husband', label: 'Husband', gender: 'male' }
];

function marriedInTo(id) {
  var sp = spouseOf(id);
  if (!sp) return null;
  return isBloodRelative(id) ? null : sp;      // blood relatives keep a gender field
}

/* What would this person's term be if their gender were X? Answered by running
   the real resolver against a copy, so the preview can never drift from what
   the app actually produces. */
function previewPartnerTerm(person, gender) {
  var original = person.gender, had = ('gender' in person);
  person.gender = gender;
  var t = null;
  try { t = termBetween(STATE.egoId, person.id); } catch (err) { t = null; }
  if (had) person.gender = original; else delete person.gender;
  return t;
}

function roleFieldHtml(person) {
  var host = marriedInTo(person.id);

  if (host) {
    var hostName = displayName(getPerson(host));
    return '<div class="eyebrow" style="margin-bottom:6px">Relationship to ' + esc(hostName) + '</div>' +
      '<div style="display:flex;gap:6px;margin-bottom:4px">' +
      PARTNER_ROLES.map(function (r) {
        var on = (person.partnerRole || '') === r.key;
        // Show what each choice would actually produce for this person, rather
        // than naming a fixed example pair that only applies to an aunt or uncle.
        var would = previewPartnerTerm(person, r.gender);
        return '<button data-act="set-partner-role" data-id="' + person.id + '" data-value="' + r.key + '" ' +
          'style="flex:1;padding:8px 6px;border-radius:9px;font-size:11.5px;cursor:pointer;line-height:1.35;' +
          'border:1px solid ' + (on ? C.paternal : 'rgba(42,31,20,0.18)') + ';background:' +
          (on ? C.paternal : 'transparent') + ';color:' + (on ? C.cream : C.ink) + '">' + r.label +
          (would ? '<span class="han" style="display:block;font-size:13px;margin-top:2px;opacity:' +
            (on ? '.92' : '.65') + '">' + esc(would.characters) + '</span>' : '') +
          '</button>';
      }).join('') + '</div>' +
      (function () {
        var w = previewPartnerTerm(person, 'female'), h = previewPartnerTerm(person, 'male');
        var msg;
        if (!w && !h) {
          msg = 'This decides which term applies.';
        } else if (w && h && w.characters === h.characters) {
          msg = 'Either way the term is ' + w.characters + ' ' + w.romanization +
                ' — but recording it keeps the rest of the tree accurate.';
        } else {
          msg = 'This is what decides the term — ' +
                (w ? w.characters + ' ' + w.romanization + ' for a wife' : 'no settled term for a wife') +
                ', ' +
                (h ? h.characters + ' ' + h.romanization + ' for a husband' : 'no settled term for a husband') + '.';
        }
        var prov = (w && w.provisional) || (h && h.provisional);
        return '<p style="font-size:11px;color:' + (prov ? C.self : C.faint) +
          ';line-height:1.5;margin:0 0 12px">' + esc(msg) +
          (prov ? ' One of these has no attested term and is borrowed — the card will say so.' : '') + '</p>';
      })();
  }

  return '<div class="eyebrow" style="margin-bottom:6px">Gender — decides which term applies</div>' +
    '<div style="display:flex;gap:6px;margin-bottom:12px">' +
    [['female', 'Female'], ['male', 'Male'], ['', 'Not recorded']].map(function (g) {
      var on = (person.gender || '') === g[0];
      return '<button data-act="set-gender" data-id="' + person.id + '" data-value="' + g[0] + '" ' +
        'style="flex:1;padding:8px 4px;border-radius:9px;font-size:11.5px;cursor:pointer;' +
        'border:1px solid ' + (on ? C.paternal : 'rgba(42,31,20,0.18)') + ';background:' +
        (on ? C.paternal : 'transparent') + ';color:' + (on ? C.cream : C.ink) + '">' + g[1] + '</button>';
    }).join('') + '</div>';
}

function birthSectionHtml(person) {
  if (STATE.editingBirth === person.id) {
    return '<div style="padding:13px 14px;border-radius:12px;background:' + C.surface +
      ';border:1px solid rgba(42,31,20,0.12);margin-bottom:16px">' +
      '<div class="eyebrow" style="margin-bottom:6px">Name</div>' +
      '<input id="detailName" type="text" value="' + esc(displayName(person)) + '" ' +
      'style="width:100%;padding:8px;border-radius:8px;border:1px solid rgba(42,31,20,0.18);' +
      'background:' + C.bg + ';font-family:inherit;font-size:13px;margin-bottom:12px" />' +

      roleFieldHtml(person) +
      dateFieldsHtml('birth', person.birthDate, person.birthYear, 'Born — all parts optional') +
      dateFieldsHtml('death', person.deathDate, person.deathYear, 'Died — leave blank if living') +

      '<div style="display:flex;gap:8px;margin-bottom:12px">' +
      countrySelectHtml('bornInSel', person.bornIn, 'Born in') +
      countrySelectHtml('settledInSel', person.settledIn, 'Settled in') + '</div>' +

      '<div id="birthError" style="display:none;font-size:11px;color:' + C.paternal + ';margin-bottom:8px"></div>' +
      '<div style="display:flex;gap:6px">' +
      '<button data-act="save-birth" data-id="' + person.id + '" style="flex:1;padding:8px;border-radius:9px;' +
      'border:none;background:' + C.paternal + ';color:' + C.cream + ';font-size:12px;cursor:pointer">Save</button>' +
      '<button data-act="cancel-birth" style="padding:8px 12px;border-radius:9px;background:transparent;' +
      'border:1px solid rgba(42,31,20,0.2);font-size:12px;cursor:pointer;color:' + C.ink + '">Cancel</button>' +
      '<button data-act="clear-birth" data-id="' + person.id + '" style="padding:8px 12px;border-radius:9px;' +
      'background:transparent;border:1px solid rgba(42,31,20,0.2);font-size:12px;cursor:pointer;color:' +
      C.muted + '">Clear dates</button>' +
      '</div></div>';
  }

  var text = formatLife(person);
  var age = isDeceased(person) ? null : ageOf(person);
  var today = birthdayIsToday(person) && !isDeceased(person);
  var places = [];
  if (person.bornIn) places.push('Born in ' + countryName(person.bornIn));
  if (person.settledIn && person.settledIn !== person.bornIn) {
    places.push('settled in ' + countryName(person.settledIn));
  }

  return '<button data-act="edit-birth" data-id="' + person.id + '" ' +
    'style="width:100%;text-align:left;padding:10px 14px;border-radius:12px;margin-bottom:16px;cursor:pointer;' +
    'background:' + (text ? C.surface : 'transparent') + ';border:1px ' + (text ? 'solid' : 'dashed') +
    ' rgba(42,31,20,0.16);display:flex;align-items:center;gap:10px">' +
    '<span style="font-size:13px;color:' + (text ? C.ink : C.muted) + '">' +
    (text ? esc(text) : 'Add birth date, places, name') + '</span>' +
    (age !== null ? '<span style="font-size:11px;color:' + C.faint + '">· ' + age + '</span>' : '') +
    (today ? '<span style="font-size:10px;color:' + C.paternal + ';background:rgba(191,90,53,0.12);' +
      'padding:2px 7px;border-radius:20px">Today</span>' : '') +
    '<span style="margin-left:auto;font-size:11px;color:' + C.faint + '">' + (text ? 'Edit' : '+') + '</span>' +
    '</button>' +
    (places.length
      ? '<div style="font-size:11.5px;color:' + C.muted + ';margin:-10px 0 16px;padding:0 4px">' +
        esc(places.join(' · ')) + '</div>'
      : '');
}

/* ══════════════════════════════════════════════════════════════════════════
   GROWING THE TREE
   A tree is never finished. Anyone on it can gain a parent, sibling, partner or
   child, which is also how the deeper generations get added — give a grandparent
   a parent and you have great-grandparents.
   ══════════════════════════════════════════════════════════════════════════ */
var ADD_KINDS = [
  { kind: 'parent',  label: 'Parent',  hint: 'Adds a generation above' },
  { kind: 'sibling', label: 'Sibling', hint: 'Shares their parents' },
  { kind: 'spouse',  label: 'Partner', hint: 'Marries in' },
  { kind: 'child',   label: 'Child',   hint: 'Adds a generation below' }
];

function canAdd(kind, person) {
  if (kind === 'parent') return parentsOf(person.id).length < 2;
  if (kind === 'spouse') return !spouseOf(person.id);
  if (kind === 'sibling') return parentsOf(person.id).length > 0;
  return true;
}
function whyNot(kind, person) {
  if (kind === 'parent') return 'Both parents are already here';
  if (kind === 'spouse') return 'Already has a partner';
  if (kind === 'sibling') return 'Add a parent first — siblings need someone to share';
  return '';
}

/* What a new child of this person would be to you — the reason you're most
   likely to be here is adding cousins to a specific aunt or uncle. */
function childWouldBe(person) {
  if (person.id === STATE.egoId) return 'your child';
  var link = linkDepths(STATE.egoId, person.id);
  if (link && link.dF === 2 && link.dT === 1) return 'your cousin';
  if (link && link.dF === 1 && link.dT === 1) return 'your niece or nephew';
  if (link && link.dF === 1 && link.dT === 0) return 'your sibling';
  var sp = spouseOf(person.id);
  if (sp) {
    var l2 = linkDepths(STATE.egoId, sp);
    if (l2 && l2.dF === 2 && l2.dT === 1) return 'your cousin';
  }
  return null;
}

function addRelativeHtml(person) {
  var childNote = childWouldBe(person);
  var buttons = ADD_KINDS.map(function (k) {
    var ok = canAdd(k.kind, person);
    var hint = k.hint;
    if (k.kind === 'child' && childNote) hint = 'Their child is ' + childNote;
    return '<button ' + (ok ? 'data-act="add-relative" data-kind="' + k.kind + '" data-id="' + person.id + '"' : 'disabled') +
      ' title="' + esc(ok ? hint : whyNot(k.kind, person)) + '" ' +
      'style="flex:1;min-width:64px;padding:8px 6px;border-radius:10px;font-size:11.5px;' +
      'border:1px solid rgba(42,31,20,0.16);background:' + (ok ? C.surface : 'transparent') + ';' +
      'color:' + (ok ? C.ink : C.faint) + ';cursor:' + (ok ? 'pointer' : 'default') + '">+ ' + k.label + '</button>';
  }).join('');

  var kids = childrenOf(person.id);

  return '<div style="margin-bottom:16px">' +
    '<div class="eyebrow" style="margin-bottom:7px">Add someone connected to ' +
    esc(displayName(person)) + '</div>' +
    '<div style="display:flex;gap:6px;flex-wrap:wrap">' + buttons + '</div>' +
    (childNote === 'your cousin'
      ? '<p style="font-size:11.5px;color:' + C.muted + ';line-height:1.55;margin:8px 0 0">' +
        'Their children are your cousins' +
        (kids.length ? ' — ' + kids.length + ' added so far.' : '. Add them one at a time so each lands on the right parent.') +
        '</p>'
      : '') +
    '</div>';
}

/* Removing someone can strand the people who only reached the tree through
   them. The count is worked out first and shown, so nobody disappears quietly. */
function removalImpact(id) {
  if (id === STATE.egoId) return null;
  var keptEdges = STATE.edges.filter(function (e) { return e.a !== id && e.b !== id; });
  var reachable = {}, queue = [STATE.egoId];
  reachable[STATE.egoId] = true;
  var guard = 0;
  while (queue.length && guard++ < 5000) {
    var cur = queue.shift();
    keptEdges.forEach(function (e) {
      var other = e.a === cur ? e.b : (e.b === cur ? e.a : null);
      if (other && !reachable[other]) { reachable[other] = true; queue.push(other); }
    });
  }
  var lost = STATE.people
    .filter(function (p) { return p.id !== id && !reachable[p.id]; })
    .map(function (p) { return p.id; });
  return { id: id, alsoLost: lost };
}

function removePersonHtml(person) {
  if (person.id === STATE.egoId) return '';
  var impact = removalImpact(person.id);
  var extra = impact ? impact.alsoLost.length : 0;

  if (STATE.confirmRemove !== person.id) {
    return '<button data-act="ask-remove" data-id="' + person.id + '" ' +
      'style="width:100%;padding:9px;border-radius:10px;cursor:pointer;background:transparent;' +
      'border:1px solid rgba(42,31,20,0.14);font-size:11.5px;color:' + C.faint + '">' +
      'Remove ' + esc(displayName(person)) + ' from the tree</button>';
  }

  return '<div style="padding:12px 13px;border-radius:11px;background:rgba(191,90,53,0.08);' +
    'border:1px solid rgba(191,90,53,0.35)">' +
    '<div style="font-size:12.5px;color:' + C.ink + ';margin-bottom:5px">Remove ' +
    esc(displayName(person)) + '?</div>' +
    '<p style="font-size:11.5px;color:' + C.muted + ';line-height:1.55;margin:0 0 10px">' +
    (extra
      ? extra + ' other ' + (extra === 1 ? 'person' : 'people') +
        ' reach the tree only through them and will be removed too.'
      : 'Nobody else is affected.') + '</p>' +
    '<div style="display:flex;gap:6px">' +
    '<button data-act="confirm-remove" data-id="' + person.id + '" style="flex:1;padding:8px;' +
    'border-radius:9px;border:none;background:' + C.paternal + ';color:' + C.cream +
    ';font-size:12px;cursor:pointer">Remove' + (extra ? ' ' + (extra + 1) + ' people' : '') + '</button>' +

/* Creates the person and the edges that place them, then opens their card so
   the new arrival can be named straight away. */
function addRelative(kind, toId) {
  var anchor = getPerson(toId);
  if (!anchor || !canAdd(kind, anchor)) return;

  STATE._nextId = (STATE._nextId || 0) + 1;
  var id = 'added-' + STATE._nextId;
  var person = { id: id, name: 'New ' + kind };   // gender set on their card, not guessed
  var edges = [];

  if (kind === 'parent') {
    var existing = parentsOf(toId);
    // Gender is left for you to set — a second parent isn't necessarily the
    // opposite of the first, and the term depends on getting this right
    person.name = 'New parent';
    edges.push({ type: 'parent', a: id, b: toId });
    if (existing.length === 1) edges.push({ type: 'spouse', a: existing[0], b: id });
    // The new parent also parents the anchor's full siblings
    siblingsOf(toId).forEach(function (sib) {
      if (parentsOf(sib).indexOf(existing[0]) !== -1) edges.push({ type: 'parent', a: id, b: sib });
    });

  } else if (kind === 'sibling') {
    person.name = 'New sibling';
    parentsOf(toId).forEach(function (p) { edges.push({ type: 'parent', a: p, b: id }); });

  } else if (kind === 'spouse') {
    person.name = 'New partner';
    edges.push({ type: 'spouse', a: toId, b: id });

  } else {
    person.name = 'New child';
    edges.push({ type: 'parent', a: toId, b: id });
    var sp = spouseOf(toId);
    if (sp) edges.push({ type: 'parent', a: sp, b: id });
  }

  STATE.people = STATE.people.concat([person]);
  STATE.edges = STATE.edges.concat(edges);
  STATE.isDemo = false;          // the demo's fixed layout can't hold new people
  STATE.selectedId = id;
  STATE.editingBirth = id;
  invalidateLayout();
  render();
}

/* Removes someone along with anyone left stranded, and drops every edge that
   touched them so no connector points at a person who is no longer there. */
function removePerson(id) {
  if (id === STATE.egoId) return;
  var impact = removalImpact(id);
  var gone = {};
  gone[id] = true;
  if (impact) impact.alsoLost.forEach(function (x) { gone[x] = true; });

  STATE.people = STATE.people.filter(function (p) { return !gone[p.id]; });
  STATE.edges = STATE.edges.filter(function (e) { return !gone[e.a] && !gone[e.b]; });

  if (gone[STATE.selectedId]) STATE.selectedId = null;
  if (gone[STATE.connectA]) STATE.connectA = null;
  if (gone[STATE.connectB]) STATE.connectB = null;
  STATE.submissions = STATE.submissions.filter(function (s) { return !gone[s.fromId] && !gone[s.toId]; });

  STATE.confirmRemove = null;
  STATE.editingBirth = null;
  STATE.isDemo = false;          // the demo's fixed layout assumes its own cast
  invalidateLayout();
  render();
}

function matchQuery(query) {
  // Copy is American English, but the matcher accepts either spelling — people
  // type what they say, and plenty of Teochew families say "mum".
  var q = String(query || '').toLowerCase();
  if (/dad.*old.*bro|father.*old.*bro|ba.*be|uncle.*be/.test(q)) return 'paternal-uncle-older';
  if (/dad.*young.*bro|father.*young.*bro|ba.*zeg|uncle.*zeg|叔/.test(q)) return 'paternal-uncle-younger';
  if (/dad.*sis|father.*sis|ba.*gou|aunt.*gou|姑/.test(q)) return 'paternal-aunt';
  if (/m[ou]m.*bro|mother.*bro|ma.*gu|uncle.*gu|舅/.test(q)) return 'maternal-uncle';
  if (/m[ou]m.*sis|mother.*sis|ma.*yi|aunt.*yi|姨/.test(q)) return 'maternal-aunt';
  if (/old.*bro|兄/.test(q)) return 'older-brother';
  if (/young.*bro|弟/.test(q)) return 'younger-brother';
  if (/old.*sis|姊/.test(q)) return 'older-sister';
  if (/young.*sis|妹/.test(q)) return 'younger-sister';
  if (/dad.*dad|grandad.*pat|a-gong.*pat|公/.test(q)) return 'paternal-grandfather';
  if (/dad.*m[ou]m|a-ma.*pat|嫲/.test(q)) return 'paternal-grandmother';
  if (/m[ou]m.*dad|mat.*grandad/.test(q)) return 'maternal-grandfather';
  if (/m[ou]m.*m[ou]m|mat.*gran/.test(q)) return 'maternal-grandmother';
  if (/wife.*older.*uncle|older.*uncle.*wife|姆/.test(q)) return 'paternal-uncle-older-wife';
  if (/wife.*younger.*uncle|younger.*uncle.*wife|嬸/.test(q)) return 'paternal-uncle-younger-wife';
  if (/wife.*m[ou]m.*bro|gim|妗/.test(q)) return 'maternal-uncle-wife';
  if (/dad|father|爸/.test(q)) return 'father';
  if (/m[ou]m|mother|媽/.test(q)) return 'mother';
  return null;
}

   scrolling a dropdown of 42 people to find one relative is the slow path. */
function matchesPerson(p, q) {
  if (!q) return true;
  q = q.toLowerCase();
  var hay = [displayName(p), p.name, p.nickname || ''];
  var t = resolveTerm(p.id);
  if (t) { hay.push(t.characters, t.romanization, t.pronunciation || ''); }
  hay.push(describeRelationship(p.id));
  return hay.join(' ').toLowerCase().indexOf(q) !== -1;
}

/* Explains why the two directions differ — generation first, then age. */
function asymmetryNote(aId, bId) {
  var link = linkDepths(aId, bId);
  if (!link) return 'These two are linked only by marriage, not by blood — which is exactly why no ' +
    'address term applies in either direction.';

  if (link.dF === link.dT) {
    var age = relativeAge(aId, bId);
    if (!age) return 'Same generation — the term depends on who is older, which this tree does not record for both.';
    var older = age === 'older' ? bId : aId;
    var younger = age === 'older' ? aId : bId;
    return 'Same generation, so age decides: ' + displayName(getPerson(older)) + ' is older, so ' +
           displayName(getPerson(younger)) + ' uses an elder term while ' + displayName(getPerson(older)) +
           ' may use a junior term or simply the name.';
  }

  var senior = link.dF > link.dT ? bId : aId;
  var junior = link.dF > link.dT ? aId : bId;
  var sP = getPerson(senior), jP = getPerson(junior);
  var note = 'Generation outranks age here. ' + displayName(sP) + ' stands a generation above ' +
             displayName(jP) + ', so ' + displayName(jP) + ' uses the title';
  if (sP.birthYear != null && jP.birthYear != null && sP.birthYear > jP.birthYear) {
    note += ' — even though ' + displayName(jP) + ' is the older of the two in years';
  }
  return note + '.';
}

/* ══════ BLOOM ═════════════════════════════════════════════════════════ */



/* ══════════════════════════════════════════════════════════════════════════
   BLOOM DASHBOARD
   Every figure is derived from STATE.people, so an onboarding-built tree gets
   the same dashboard as the demo — it just reports on whatever data exists.
   ══════════════════════════════════════════════════════════════════════════ */
var MONTH_NAMES = ['January','February','March','April','May','June',
                   'July','August','September','October','November','December'];

/* The dashboard filter. Every card reads from the same filtered set, so
   clicking "born in China" narrows the ratio, the birthdays, the migration
   flow and the tree together rather than only the chart that was clicked. */
function bloomMatches(p) {
  var f = STATE.bloomFilter;
  if (!f) return true;
  if (f.kind === 'birthdayMonth') {
    if (!p.birthDate) return false;
    return parseInt(p.birthDate.split('-')[0], 10) === new Date().getMonth() + 1;
  }
  if (f.kind === 'gender') return p.gender === f.value;
  return p[f.kind] === f.value;
}
function filterLabel() {
  var f = STATE.bloomFilter;
  if (!f) return null;
  if (f.kind === 'birthdayMonth') return 'Birthdays in ' + MONTH_NAMES[new Date().getMonth()];
  if (f.kind === 'gender') return f.value === 'male' ? 'Men in the family' : 'Women in the family';
  return (f.kind === 'bornIn' ? 'Born in ' : 'Settled in ') + countryName(f.value);
}

/* "19 July" — the day and month, without the year */
function formatDayMonth(p) {
  if (!p || !p.birthDate) return '';
  var md = p.birthDate.split('-');
  return parseInt(md[1], 10) + ' ' + MONTH_NAMES[parseInt(md[0], 10) - 1];
}

function familyStats(all) {
  var people = all ? STATE.people : STATE.people.filter(bloomMatches);
  var male = 0, female = 0;
  var thisMonth = [];
  var bornCounts = {}, settledCounts = {}, flows = {};
  var month = new Date().getMonth() + 1;

  people.forEach(function (p) {
    if (p.gender === 'male') male++; else if (p.gender === 'female') female++;

    if (p.birthDate) {
      var m = parseInt(p.birthDate.split('-')[0], 10);
      if (m === month) thisMonth.push(p);
    }
    if (p.bornIn)    bornCounts[p.bornIn] = (bornCounts[p.bornIn] || 0) + 1;
    if (p.settledIn) settledCounts[p.settledIn] = (settledCounts[p.settledIn] || 0) + 1;
    if (p.bornIn && p.settledIn) {
      var key = p.bornIn + '>' + p.settledIn;
      flows[key] = (flows[key] || 0) + 1;
    }
  });

  thisMonth.sort(function (a, b) {
    return parseInt(a.birthDate.split('-')[1], 10) - parseInt(b.birthDate.split('-')[1], 10);
  });

  var withCountry = people.filter(function (p) { return p.bornIn; }).length;
  var moved = people.filter(function (p) { return p.bornIn && p.settledIn && p.bornIn !== p.settledIn; }).length;

  return {
    total: people.length,
    male: male, female: female,
    malePct: people.length ? Math.round(male / people.length * 100) : 0,
    femalePct: people.length ? Math.round(female / people.length * 100) : 0,
    thisMonth: thisMonth, monthName: MONTH_NAMES[month - 1],
    bornCounts: bornCounts, settledCounts: settledCounts,
    flows: flows, withCountry: withCountry, moved: moved
  };
}

/* Donut chart. Returns '' when there's nothing to plot rather than an empty ring. */
function donutHtml(counts, total, size) {
  var keys = presentCountries(counts);
  if (!keys.length || !total) return '';
  var r = size / 2, inner = r * 0.58, cx = r, cy = r;
  var angle = -Math.PI / 2;                        // start at 12 o'clock
  var segs = '';

  keys.forEach(function (k) {
    var frac = counts[k] / total;
    var sweep = frac * Math.PI * 2;
    var end = angle + sweep;
    var large = sweep > Math.PI ? 1 : 0;
    var x1 = cx + r * Math.cos(angle),     y1 = cy + r * Math.sin(angle);
    var x2 = cx + r * Math.cos(end),       y2 = cy + r * Math.sin(end);
    var xi2 = cx + inner * Math.cos(end),  yi2 = cy + inner * Math.sin(end);
    var xi1 = cx + inner * Math.cos(angle), yi1 = cy + inner * Math.sin(angle);

    if (frac > 0.9999) {
      // A single country would degenerate to a zero-length arc — draw rings
      segs += '<circle data-act="bloom-filter" data-kind="bornIn" data-value="' + k + '" style="cursor:pointer" cx="' + cx + '" cy="' + cy + '" r="' + ((r + inner) / 2) +
        '" fill="none" stroke="' + countryColor(k) + '" stroke-width="' + (r - inner) + '"></circle>';
    } else {
      var on = STATE.bloomFilter && STATE.bloomFilter.kind === 'bornIn' && STATE.bloomFilter.value === k;
      segs += '<path data-act="bloom-filter" data-kind="bornIn" data-value="' + k + '" style="cursor:pointer" d="M ' + x1.toFixed(2) + ',' + y1.toFixed(2) +
        ' A ' + r + ',' + r + ' 0 ' + large + ' 1 ' + x2.toFixed(2) + ',' + y2.toFixed(2) +
        ' L ' + xi2.toFixed(2) + ',' + yi2.toFixed(2) +
        ' A ' + inner + ',' + inner + ' 0 ' + large + ' 0 ' + xi1.toFixed(2) + ',' + yi1.toFixed(2) +
        ' Z" fill="' + countryColor(k) + '" opacity="' +
        (STATE.bloomFilter ? (on ? 1 : 0.22) : 0.88) + '"></path>';
    }
    angle = end;
  });

  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size +
    '" xmlns="http://www.w3.org/2000/svg">' + segs +
    '<text x="' + cx + '" y="' + (cy + 2) + '" text-anchor="middle" font-size="17" font-weight="600" fill="' + C.ink +
    '" font-family="Lora,serif">' + total + '</text>' +
    '<text x="' + cx + '" y="' + (cy + 15) + '" text-anchor="middle" font-size="8" fill="' + C.faint +
    '" font-family="DM Sans,sans-serif">people</text></svg>';
}

function legendRowsHtml(counts, total) {
  return presentCountries(counts).map(function (k) {
    var pct = Math.round(counts[k] / total * 100);
    var active = STATE.bloomFilter && STATE.bloomFilter.kind === 'bornIn' && STATE.bloomFilter.value === k;
    return '<div data-act="bloom-filter" data-kind="bornIn" data-value="' + k + '" ' +
      'style="display:flex;align-items:center;gap:8px;font-size:11px;padding:3px 5px;cursor:pointer;' +
      'border-radius:6px;margin:0 -5px;background:' + (active ? 'rgba(42,31,20,0.07)' : 'transparent') + '">' +
      '<span style="width:9px;height:9px;border-radius:2px;background:' + countryColor(k) + ';flex-shrink:0"></span>' +
      '<span style="flex:1;color:' + C.ink + '">' + esc(countryName(k)) + '</span>' +
      '<span style="color:' + C.muted + ';font-variant-numeric:tabular-nums">' + counts[k] + '</span>' +
      '<span style="color:' + C.faint + ';min-width:28px;text-align:right;font-variant-numeric:tabular-nums">' + pct + '%</span>' +
      '</div>';
  }).join('');
}

/* Migration flow: born on the left, settled on the right, ribbons between.
   Stayed-put flows are drawn flat and faint so movement is what stands out. */
function migrationFlowHtml(stats) {
  var flows = Object.keys(stats.flows);
  if (!flows.length) return '';

  var W = 272, rowH = 22, pad = 10;
  var bornKeys = presentCountries(stats.bornCounts);
  var setKeys  = presentCountries(stats.settledCounts);
  var H = Math.max(bornKeys.length, setKeys.length) * rowH + pad * 2;

  function yOf(keys, k) { return pad + keys.indexOf(k) * rowH + rowH / 2; }

  var ribbons = flows.sort(function (a, b) { return stats.flows[b] - stats.flows[a]; }).map(function (key) {
    var parts = key.split('>'), from = parts[0], to = parts[1];
    var n = stats.flows[key];
    var y1 = yOf(bornKeys, from), y2 = yOf(setKeys, to);
    var stayed = from === to;
    var w = Math.max(1.5, Math.min(9, n * 1.5));
    return '<path d="M 74,' + y1 + ' C 140,' + y1 + ' ' + (W - 140) + ',' + y2 + ' ' + (W - 74) + ',' + y2 +
      '" fill="none" stroke="' + countryColor(from) + '" stroke-width="' + w +
      '" opacity="' + (stayed ? 0.18 : 0.55) + '" stroke-linecap="round"></path>';
  }).join('');

  var leftLabels = bornKeys.map(function (k) {
    var y = yOf(bornKeys, k);
    return '<circle cx="70" cy="' + y + '" r="3.5" fill="' + countryColor(k) + '"></circle>' +
      '<text x="62" y="' + (y + 3.5) + '" text-anchor="end" font-size="10" fill="' + C.ink +
      '" font-family="DM Sans,sans-serif">' + countryShort(k) + '</text>';
  }).join('');

  var rightLabels = setKeys.map(function (k) {
    var y = yOf(setKeys, k);
    var active = STATE.bloomFilter && STATE.bloomFilter.kind === 'settledIn' && STATE.bloomFilter.value === k;
    return '<g data-act="bloom-filter" data-kind="settledIn" data-value="' + k + '" style="cursor:pointer">' +
      '<rect x="' + (W - 78) + '" y="' + (y - 9) + '" width="76" height="18" rx="5" fill="' +
      (active ? 'rgba(42,31,20,0.09)' : 'transparent') + '"></rect>' +
      '<circle cx="' + (W - 70) + '" cy="' + y + '" r="3.5" fill="' + countryColor(k) + '"></circle>' +
      '<text x="' + (W - 62) + '" y="' + (y + 3.5) + '" font-size="10" fill="' + C.ink +
      '" font-family="DM Sans,sans-serif">' + countryShort(k) + '</text></g>';
  }).join('');

  return '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' +
    ribbons + leftLabels + rightLabels + '</svg>';
}
